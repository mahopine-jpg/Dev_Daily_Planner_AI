<style>
/* ==========================================================================
   Daily Planner AI - Design Tokens & Base Styles
   ========================================================================== */

@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Fredoka:wght@600;700&display=swap');

:root {
  /* --- Color: base palette (Image1トーン) --- */
  --bg-cream: #F7EFDD;
  --bg-cream-deep: #F0E4C9;
  --surface: #FFFDF8;
  --surface-alt: #FBF6EA;

  --ink: #2E2440;
  --ink-muted: #7C7189;
  --ink-faint: #A79CB5;

  --primary: #6E4FA0;
  --primary-dark: #543C82;
  --primary-soft: #D9CDEF;
  --primary-pale: #EFE8F8;

  /* --- Color: cute accent (Image2由来、控えめに使用) --- */
  --accent-blush: #F1B3C4;
  --accent-blush-pale: #FBE3E9;

  /* --- Color: category coding --- */
  --cat-life: #B9AEE0;      /* 基本スケジュール */
  --cat-ai: #6E4FA0;        /* AI相談で組んだ予定 */
  --cat-manual: #FFFFFF;    /* 手動追加 */
  --cat-meal: #E8935E;      /* 献立 */

  --success: #6FA07C;
  --danger: #C2665F;

  /* --- Type --- */
  --font-display: 'Zen Maru Gothic', 'M PLUS Rounded 1c', sans-serif;
  --font-body: 'M PLUS Rounded 1c', 'Zen Maru Gothic', sans-serif;

  /* --- Radius / Shadow --- */
  --radius-lg: 22px;
  --radius-md: 16px;
  --radius-sm: 10px;
  --radius-pill: 999px;

  --shadow-card: 0 2px 10px rgba(110, 79, 160, 0.08);
  --shadow-float: 0 6px 20px rgba(110, 79, 160, 0.22);

  /* --- Layout --- */
  --nav-height: 64px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --header-height: 56px;
  --content-max-width: 480px;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: var(--bg-cream);
  color: var(--ink);
  font-family: var(--font-body);
  -webkit-tap-highlight-color: transparent;
  overflow-x: hidden; /* 個々の要素の横はみ出しが万一残っていても、画面全体の横スクロールは起きないようにする保険 */
}

body {
  overscroll-behavior-y: contain;
}

h1, h2, h3, .display {
  font-family: var(--font-display);
  font-weight: 700;
  color: var(--ink);
  margin: 0;
}

p { margin: 0; }

button, input, textarea, select {
  font-family: inherit;
  color: inherit;
}

button {
  border: none;
  background: none;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

a { color: var(--primary); }

::placeholder {
  color: var(--ink-faint);
}

/* --- App shell --- */
#app {
  max-width: var(--content-max-width);
  margin: 0 auto;
  min-height: 100%;
  background: var(--bg-cream);
  position: relative;
  display: flex;
  flex-direction: column;
}

.screen {
  flex: 1;
  padding-bottom: calc(var(--nav-height) + var(--safe-bottom) + 12px);
  min-height: 100vh;
}

.app-header {
  background: var(--bg-cream);
  padding: 10px 20px 10px;
}

.app-header__title {
  font-size: 20px;
  letter-spacing: 0.02em;
}

.app-header__subtitle {
  margin-top: 2px;
  font-size: 13px;
  color: var(--ink-muted);
}

/* --- App title bar (全画面共通、最上部) --- */
.app-titlebar {
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 12;
  text-align: center;
  padding: calc(env(safe-area-inset-top, 0px) + 18px) 16px 14px;
  background: var(--bg-cream);
}

.app-titlebar__title {
  font-family: 'Fredoka', var(--font-display);
  font-weight: 700;
  font-size: 32px;
  letter-spacing: 0.01em;
  line-height: 1.1;
  background: linear-gradient(90deg, var(--primary) 0%, #9B6FC9 50%, var(--accent-blush) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

/* --- Bottom navigation --- */
.bottom-nav {
  position: fixed;
  left: 50%;
  transform: translateX(-50%);
  bottom: 0;
  width: 100%;
  max-width: var(--content-max-width);
  height: calc(var(--nav-height) + var(--safe-bottom));
  background: var(--surface);
  border-top: 1px solid rgba(110, 79, 160, 0.12);
  display: flex;
  align-items: stretch;
  justify-content: space-around;
  z-index: 20;
  padding-bottom: var(--safe-bottom);
}

.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  font-size: 11px;
  color: var(--ink-faint);
  padding: 6px 2px;
}

.nav-item__icon {
  width: 22px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.nav-item.is-active {
  color: var(--primary);
  font-weight: 700;
}

/* --- Segmented control (today/tomorrow) --- */
.segmented {
  display: flex;
  background: var(--primary-pale);
  border-radius: var(--radius-pill);
  padding: 4px;
  gap: 4px;
}

.segmented__option {
  flex: 1;
  text-align: center;
  padding: 9px 0;
  border-radius: var(--radius-pill);
  font-weight: 700;
  font-size: 14px;
  color: var(--primary-dark);
  transition: background 0.15s ease, color 0.15s ease;
}

.segmented__option.is-selected {
  background: var(--primary);
  color: #fff;
}

/* --- 献立タブ用の差し色バリエーション（予定タブとの視覚的な区別） --- */
.segmented--meal .segmented__option.is-selected {
  background: var(--cat-meal);
}

.btn--meal-primary {
  background: var(--cat-meal);
  color: #fff;
  box-shadow: 0 6px 20px rgba(232, 147, 94, 0.32);
}

.fab--meal {
  background: var(--cat-meal);
  box-shadow: 0 6px 20px rgba(232, 147, 94, 0.32);
}

.empty-state--meal .empty-state__motif {
  filter: none;
}

.app-header--meal .app-header__title {
  color: var(--cat-meal);
}

/* --- Cards --- */
.card {
  background: var(--surface);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
  padding: 16px;
}

.card--outline {
  background: var(--surface);
  border: 1.5px solid var(--primary-soft);
  box-shadow: none;
}

/* --- Buttons --- */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  border-radius: var(--radius-pill);
  font-weight: 700;
  font-size: 15px;
  padding: 13px 22px;
  transition: transform 0.1s ease, opacity 0.15s ease;
}

.btn:active { transform: scale(0.97); }

.btn--primary {
  background: var(--primary);
  color: #fff;
  box-shadow: var(--shadow-float);
}

.btn--secondary {
  background: var(--primary-pale);
  color: var(--primary-dark);
}

.btn--outline {
  background: transparent;
  border: 1.5px solid var(--primary-soft);
  color: var(--primary-dark);
}

.btn--danger {
  background: transparent;
  color: var(--danger);
}

.btn:disabled {
  opacity: 0.4;
  pointer-events: none;
}

.btn--block { width: 100%; }

.btn--sm {
  padding: 8px 16px;
  font-size: 13px;
}

.fab {
  position: fixed;
  right: calc(50% - var(--content-max-width) / 2 + 20px);
  bottom: calc(var(--nav-height) + var(--safe-bottom) + 18px);
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: var(--primary);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow-float);
  font-size: 26px;
  z-index: 15;
}

@media (max-width: 480px) {
  .fab { right: 20px; }
}

/* --- Forms --- */
.field {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 16px;
}

.field__label {
  font-size: 13px;
  font-weight: 700;
  color: var(--ink-muted);
}

.input, .textarea, .select {
  background: var(--surface);
  border: 1.5px solid var(--primary-soft);
  border-radius: var(--radius-md);
  padding: 12px 14px;
  font-size: 15px;
  color: var(--ink);
  width: 100%;
  min-width: 0; /* flexコンテナ(.field等)の子要素になった際、内容量に応じて広がってしまう既定挙動(min-width:auto)を無効化する */
  box-sizing: border-box;
}

/*
 * iOS Safariの input[type="time"] / input[type="date"] は、ネイティブのピッカーUIが
 * 独自の最小幅を持っており、上記の min-width:0 だけでは幅の指定(width:100%)を
 * 無視して横にはみ出すことがある。type別に明示的に上書きして確実に幅を制約する。
 */
input[type="time"],
input[type="date"] {
  width: 100% !important;
  min-width: 0 !important;
  max-width: 100%;
  box-sizing: border-box;
}

.input:focus, .textarea:focus, .select:focus {
  outline: none;
  border-color: var(--primary);
}

.textarea {
  resize: vertical;
  min-height: 90px;
  line-height: 1.6;
  font-family: var(--font-body);
}

.hint {
  font-size: 12px;
  color: var(--ink-muted);
  line-height: 1.5;
}

/* --- Empty state --- */
.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--ink-muted);
}

.empty-state__motif {
  font-size: 34px;
  margin-bottom: 10px;
  opacity: 0.7;
}

.empty-state__text {
  font-size: 14px;
  line-height: 1.7;
}

/* --- Modal / bottom sheet --- */
.sheet-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(46, 36, 64, 0.35);
  z-index: 30;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}

.sheet {
  width: 100%;
  max-width: var(--content-max-width);
  background: var(--surface);
  border-radius: 24px 24px 0 0;
  max-height: 88vh;
  overflow-y: auto;
  padding: 10px 20px calc(24px + env(safe-area-inset-bottom, 0));
  animation: sheet-up 0.22s ease-out;
}

@keyframes sheet-up {
  from { transform: translateY(24px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.sheet__handle {
  width: 40px;
  height: 4px;
  border-radius: var(--radius-pill);
  background: var(--primary-soft);
  margin: 6px auto 14px;
}

.sheet__header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.sheet__close {
  font-size: 20px;
  color: var(--ink-muted);
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* --- Toast --- */
.toast {
  position: fixed;
  left: 50%;
  bottom: calc(var(--nav-height) + var(--safe-bottom) + 16px);
  transform: translateX(-50%);
  background: var(--ink);
  color: #fff;
  padding: 10px 18px;
  border-radius: var(--radius-pill);
  font-size: 13px;
  z-index: 50;
  box-shadow: var(--shadow-float);
  opacity: 0;
  transition: opacity 0.2s ease;
  pointer-events: none;
}

.toast.is-visible { opacity: 1; }

/* --- Timeline (schedule/meal tabs) --- */
.timeline {
  position: relative;
  padding-left: 6px;
}

.timeline__row {
  display: grid;
  grid-template-columns: 44px 20px 1fr;
  align-items: start;
  margin-bottom: 14px;
}

.timeline__time {
  font-size: 12px;
  font-weight: 700;
  color: var(--ink-muted);
  padding-top: 14px;
}

.timeline__node {
  position: relative;
  display: flex;
  justify-content: center;
}

.timeline__node::before {
  content: '';
  position: absolute;
  top: 0;
  bottom: -14px;
  width: 2px;
  background: var(--primary-soft);
}

.timeline__node::after {
  content: '';
  width: 10px;
  height: 10px;
  margin-top: 16px;
  border-radius: 40% 60% 60% 40% / 50% 40% 60% 50%; /* 花形のシグネチャーノード */
  background: var(--primary);
  z-index: 1;
}

.timeline__card {
  padding: 12px 14px;
}

.timeline__card--is-life { border-left: 4px solid var(--cat-life); }
.timeline__card--is-ai { border-left: 4px solid var(--cat-ai); }
.timeline__card--is-manual { border-left: 4px solid var(--ink-faint); }
.timeline__card--is-meal { border-left: 4px solid var(--cat-meal); }

.timeline__badge {
  font-size: 11px;
  font-weight: 700;
  color: var(--ink-muted);
  margin-bottom: 3px;
}

.timeline__title {
  font-size: 15px;
  font-weight: 700;
}

.timeline__meta {
  margin-top: 2px;
  font-size: 12px;
  color: var(--ink-muted);
}

.screen-body {
  padding: 4px 20px 20px;
}

/* フローティングボタン（.fab）と重ならないよう、下部に余白を確保する。
   FABをのせる画面のscreen-bodyには必ずこのクラスを付与する。 */
.screen-body--fab-spacing {
  padding-bottom: calc(52px + 18px + 24px + var(--safe-bottom)); /* FABの高さ + 浮かせる距離 + 余裕 + セーフエリア */
}

/* --- Utility --- */
.u-flex { display: flex; }
.u-flex-col { display: flex; flex-direction: column; }
.u-gap-8 { gap: 8px; }
.u-gap-12 { gap: 12px; }
.u-gap-16 { gap: 16px; }
.u-mt-16 { margin-top: 16px; }
.u-mt-24 { margin-top: 24px; }
.u-center { align-items: center; justify-content: center; }
.u-between { justify-content: space-between; }
.u-muted { color: var(--ink-muted); }
.u-text-sm { font-size: 13px; }

/* --- Onboarding --- */
.onboarding {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 32px 28px;
  background: linear-gradient(180deg, var(--primary-pale) 0%, var(--bg-cream) 55%);
}

.onboarding__logo {
  width: 64px;
  height: 64px;
  border-radius: var(--radius-lg);
  background: var(--primary);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  margin-bottom: 18px;
  box-shadow: var(--shadow-float);
}

.onboarding__title {
  font-size: 24px;
  margin-bottom: 8px;
}

.onboarding__lead {
  color: var(--ink-muted);
  font-size: 14px;
  line-height: 1.7;
  margin-bottom: 28px;
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}

</style>

<div id="app"></div>

<script>
/**
 * storage.js
 * localStorageラッパー（データ層）。
 * 将来 Google Drive 等に保存先を差し替える際も、呼び出し側は
 * このモジュールのインターフェース（get/set/list/remove）だけに依存する。
 */

const NS = 'dailyplanner-ai:v1:';

function key(k) {
  return NS + k;
}

/** JSONとして値を取得。存在しなければ fallback を返す */
function get(k, fallback = null) {
  try {
    const raw = localStorage.getItem(key(k));
    if (raw === null) return fallback;
    return JSON.parse(raw);
  } catch (e) {
    console.error('[storage.get] failed', k, e);
    return fallback;
  }
}

/** JSONとして値を保存 */
function set(k, value) {
  try {
    localStorage.setItem(key(k), JSON.stringify(value));
    return true;
  } catch (e) {
    console.error('[storage.set] failed', k, e);
    return false;
  }
}

function remove(k) {
  localStorage.removeItem(key(k));
}

/** 指定プレフィックスに一致する全キー（NSを除いた素のキー）を返す */
function listKeys(prefix = '') {
  const result = [];
  for (let i = 0; i < localStorage.length; i++) {
    const fullKey = localStorage.key(i);
    if (fullKey && fullKey.startsWith(NS)) {
      const bare = fullKey.slice(NS.length);
      if (bare.startsWith(prefix)) result.push(bare);
    }
  }
  return result;
}

/* ------------------------------------------------------------------ */
/* コレクション操作（エンティティを配列としてまとめて保存する簡易方式） */
/* ------------------------------------------------------------------ */

/**
 * コレクション名（例: "events", "baseSchedules", "ingredients"）単位で
 * 配列として読み書きする。デバイス内で完結するv1では十分な粒度。
 */
const Collection = {
  all(name) {
    return get(`col:${name}`, []);
  },
  save(name, items) {
    return set(`col:${name}`, items);
  },
  find(name, predicate) {
    return Collection.all(name).find(predicate) || null;
  },
  filter(name, predicate) {
    return Collection.all(name).filter(predicate);
  },
  insert(name, item) {
    const items = Collection.all(name);
    items.push(item);
    Collection.save(name, items);
    return item;
  },
  update(name, id, patch) {
    const items = Collection.all(name);
    const idx = items.findIndex((i) => i.id === id);
    if (idx === -1) return null;
    items[idx] = { ...items[idx], ...patch };
    Collection.save(name, items);
    return items[idx];
  },
  remove(name, id) {
    const items = Collection.all(name);
    const next = items.filter((i) => i.id !== id);
    Collection.save(name, next);
    return next.length !== items.length;
  },
};

/**
 * idGenerator.js
 * 設計書のID命名規則（EVT-/BASE-/STEP-/ING-/MSG-/SUGGEST-/DIARY-）に従い、
 * 連番カウンタをlocalStorageで管理する軽量な採番を行う。
 * デバイス内で完結するため衝突の心配はない。
 */

const PREFIXES = {
  event: 'EVT',
  baseSchedule: 'BASE',
  step: 'STEP',
  ingredient: 'ING',
  message: 'MSG',
  suggestion: 'SUGGEST',
};
/* 注: step プレフィックスは元々定義済み。手動編集フェーズで taskEditor.js から使用開始。 */

function nextSeq(counterName) {
  const counters = window.Storage.get('idCounters', {});
  const next = (counters[counterName] || 0) + 1;
  counters[counterName] = next;
  window.Storage.set('idCounters', counters);
  return next;
}

function pad(n, len = 6) {
  return String(n).padStart(len, '0');
}

function generateId(type) {
  const prefix = PREFIXES[type];
  if (!prefix) throw new Error(`unknown id type: ${type}`);
  const seq = nextSeq(type);
  return `${prefix}-${pad(seq)}`;
}

/** 日記IDは日付そのもの（1日1件のため） */
function diaryIdForDate(dateStr) {
  return `DIARY-${dateStr.replace(/-/g, '')}`;
}

window.IdGenerator = { generateId, diaryIdForDate };


/**
 * dateUtils.js
 * 「今日/明日」の判定、基本スケジュールの曜日一致判定などの日付処理。
 */

const DOW_KEYS = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'];
const DOW_LABEL_JA = ['日', '月', '火', '水', '木', '金', '土'];

function toDateStr(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function todayStr() {
  return toDateStr(new Date());
}

function tomorrowStr() {
  const d = new Date();
  d.setDate(d.getDate() + 1);
  return toDateStr(d);
}

/** "today" | "tomorrow" を実際の日付文字列に変換 */
function resolveTarget(target) {
  return target === 'tomorrow' ? tomorrowStr() : todayStr();
}

function dayOfWeekKey(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return DOW_KEYS[d.getDay()];
}

function formatDateLabel(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const dow = DOW_LABEL_JA[d.getDay()];
  return `${d.getMonth() + 1}月${d.getDate()}日（${dow}）`;
}

window.DateUtils = {
  toDateStr,
  todayStr,
  tomorrowStr,
  resolveTarget,
  dayOfWeekKey,
  formatDateLabel,
};

 * 「予定タブ」：献立以外のタスクを今日/明日で切り替えて時系列表示する。

 * このフェーズでは、タイムラインの描画とデータ層の疎通のみを実装する。
 */

(function () {
  'use strict';

function getEventsFor(dateStr) {
  // 基本スケジュール由来の当日インスタンスを未生成なら生成する
  ensureBaseScheduleInstances(dateStr);
  return Storage.Collection.filter(
    'events',
    (e) => e.date === dateStr && e.category !== 'meal'
  ).sort((a, b) => (a.startTime || '').localeCompare(b.startTime || ''));
}

function ensureBaseScheduleInstances(dateStr) {
  const dow = DateUtils.dayOfWeekKey(dateStr);
  const templates = Storage.Collection.filter('baseSchedules', (t) =>
    (t.daysOfWeek || []).includes(dow)
  );
  const existing = Storage.Collection.filter(
    'events',
    (e) => e.date === dateStr && e.sourceType === 'base_schedule'
  );
  const existingTemplateIds = new Set(existing.map((e) => e.sourceTemplateId));

  templates.forEach((tpl) => {
    if (existingTemplateIds.has(tpl.id)) return;
    const now = new Date().toISOString();
    Storage.Collection.insert('events', {
      id: IdGenerator.generateId('event'),
      date: dateStr,
      startTime: tpl.time,
      endTime: null,
      title: tpl.title,
      sourceType: 'base_schedule',
      sourceTemplateId: tpl.id,
      sourceSuggestId: null,
      category: tpl.category || 'life',
      memo: '',
      recipe: null,
      rescheduleHistory: [],
      status: 'planned',
      createdAt: now,
      updatedAt: now,
    });
  });
}

function categoryBadge(event) {
  if (event.sourceType === 'base_schedule') return { label: '基本スケジュール', cls: 'is-life' };
  if (event.sourceType === 'ai_chat') return { label: 'AI相談で組んだ予定', cls: 'is-ai' };
  return { label: '手動追加', cls: 'is-manual' };
}

function renderTimeline(events) {
  if (events.length === 0) {
    return `
      <div class="empty-state">
        <div class="empty-state__motif">🌸</div>
        <p class="empty-state__text">
          まだ予定がありません。<br>
          「予定について相談」するか、右下の＋から追加してみましょう。
        </p>
      </div>
    `;
  }

  return `
    <div class="timeline">
      ${events
        .map((e) => {
          const badge = categoryBadge(e);
          return `
            <div class="timeline__row" data-task-id="${e.id}" style="cursor:pointer;">
              <div class="timeline__time">${e.startTime || '--:--'}</div>
              <div class="timeline__node"></div>
              <div class="timeline__card card timeline__card--${badge.cls}">
                <div class="timeline__badge">${badge.label}</div>
                <div class="timeline__title">${escapeHtml(e.title)}</div>
              </div>
            </div>
          `;
        })
        .join('')}
    </div>
  `;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function renderScheduleTab(root) {

        items.length === 0

               <div class="empty-state__motif">🥕</div>
               <p class="empty-state__text">使いたい食材をメモしておくと、献立の相談がスムーズになります。</p>
             </div>`
          : `<div class="u-flex-col u-gap-12">${items
              .map(
                (i) => `
              <div class="card u-flex u-between u-center" data-ingredient-id="${i.id}" style="cursor:pointer;">
                <div>
                  <div class="timeline__title">${escapeHtml(i.name)}</div>
                  ${i.memo ? `<div class="timeline__meta">${escapeHtml(i.memo)}</div>` : ''}
                </div>
                <button class="btn btn--danger btn--sm ingredient-delete" data-ingredient-id="${i.id}" aria-label="削除">${Icons.close}</button>
              </div>`
              )
              .join('')}</div>`
      }
    </div>
    <button class="fab" id="add-ingredient" aria-label="食材を追加">${Icons.plus}</button>
  `;

  root.querySelector('#add-ingredient').addEventListener('click', () => {
    openIngredientModal(null, () => renderIngredients(root));
  });

  root.querySelectorAll('[data-ingredient-id]').forEach((el) => {
    if (!el.classList.contains('ingredient-delete')) {
      el.addEventListener('click', () => {
        const item = Storage.Collection.find('ingredients', (i) => i.id === el.dataset.ingredientId);
        openIngredientModal(item, () => renderIngredients(root));
      });
    }
  });

  root.querySelectorAll('.ingredient-delete').forEach((btn) => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const ok = window.confirm('この食材メモを削除します。よろしいですか？');
      if (!ok) return;
      Storage.Collection.remove('ingredients', btn.dataset.ingredientId);
      window.App.toast('削除しました');
      renderIngredients(root);
    });
  });
}

window.Screens = window.Screens || {};
window.Screens.ingredients = renderIngredients;

})();

/**
 * settings.js
 * 設定画面。FR-9（APIキー管理）に対応。
 * データのエクスポート/全削除は、将来のGoogle Drive同期に備えたバックアップ手段として、
 * この土台フェーズで先に実装しておく。
 */

(function () {
  'use strict';

function downloadJson(filename, data) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function exportAllData() {
  const keys = Storage.listKeys('');
  const dump = {};
  keys.forEach((k) => {
    dump[k] = Storage.get(k);
  });
  const today = DateUtils.todayStr();
  downloadJson(`dailyplanner-ai_backup_${today}.json`, dump);
}

function renderSettings(root) {
  const settings = Storage.Settings.get();
  const hasKey = Storage.Settings.hasApiKey();

  root.innerHTML = `
    <div class="app-header">
      <h1 class="app-header__title display">設定</h1>
    </div>
    <div class="screen-body u-flex-col u-gap-16" style="padding: 4px 20px 20px;">

      <div class="card u-flex-col u-gap-12">
        <div class="field__label">Gemini APIキー</div>
        <div style="position:relative;">
          <input id="settings-api-key" class="input" type="password"
            value="${settings.geminiApiKey || ''}" placeholder="AIza..." style="padding-right:44px;" />
          <button id="settings-toggle-visibility" type="button" aria-label="表示切替"
            style="position:absolute; right:8px; top:50%; transform:translateY(-50%); color:var(--ink-muted);">
            ${Icons.eye}
          </button>
        </div>
        <p class="hint">${hasKey ? '設定済みです。' : '未設定です（AIチャットは利用できません）。'} 端末内にのみ保存されます。</p>
        <div class="u-flex u-gap-8">
          <button id="settings-save-key" class="btn btn--primary">保存する</button>
          <button id="settings-clear-key" class="btn btn--danger">削除する</button>
        </div>
      </div>

      <div class="card u-flex-col u-gap-12">
        <div class="field__label">データ管理</div>
        <p class="hint">予定・献立・食材メモ・日記のバックアップをファイルに書き出せます。</p>
        <button id="settings-export" class="btn btn--outline">データをエクスポート</button>
        <button id="settings-delete-all" class="btn btn--danger">すべてのデータを削除</button>
      </div>

      <div class="card u-flex-col u-gap-4">
        <div class="field__label">このアプリについて</div>
        <p class="hint">Daily Planner AI（開発版）</p>
      </div>
    </div>
  `;

  const input = root.querySelector('#settings-api-key');
  root.querySelector('#settings-toggle-visibility').addEventListener('click', (e) => {
    const isPw = input.type === 'password';
    input.type = isPw ? 'text' : 'password';
    e.currentTarget.innerHTML = isPw ? Icons.eyeOff : Icons.eye;
  });

  root.querySelector('#settings-save-key').addEventListener('click', () => {
    Storage.Settings.update({ geminiApiKey: input.value.trim() });
    window.App.toast('APIキーを保存しました');
    renderSettings(root);
  });

  root.querySelector('#settings-clear-key').addEventListener('click', () => {
    Storage.Settings.update({ geminiApiKey: '' });
    window.App.toast('APIキーを削除しました');
    renderSettings(root);
  });

  root.querySelector('#settings-export').addEventListener('click', () => {
    exportAllData();
  });

  root.querySelector('#settings-delete-all').addEventListener('click', () => {
    const ok = window.confirm('すべてのデータを削除します。この操作は取り消せません。よろしいですか？');
    if (!ok) return;
    const keys = Storage.listKeys('');
    keys.forEach((k) => Storage.remove(k));
    window.App.toast('すべてのデータを削除しました');
    window.App.start();
  });
}

window.Screens = window.Screens || {};
window.Screens.settings = renderSettings;

})();


/**
 * taskEditor.js
 * 予定タブ／献立タブの「＋」ボタン、および既存タスクのタップから開く
 * 追加・編集モーダル（ボトムシート）。FR-6対応。
 * 献立モード（isMeal）のときのみ、調理手順（recipe.steps）の編集UIを表示する。
 * リスケ（FR-7・rescheduleHistoryの記録）は次フェーズで対応する。
 */

(function () {
  'use strict';

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str == null ? '' : str;
  return div.innerHTML;
}

function renderStepRow(step, index) {
  return `
    <div class="step-row u-flex u-gap-8 u-mt-16" data-step-index="${index}">
      <input class="input step-text" type="text" placeholder="手順（例：材料を切る）" value="${escapeHtml(step.text)}" style="flex:1;" />
      <input class="input step-duration" type="number" min="0" inputmode="numeric" placeholder="分" value="${step.durationMinutes ?? ''}" style="width:64px;" />
      <button type="button" class="btn btn--danger btn--sm remove-step" aria-label="この手順を削除">${Icons.close}</button>
    </div>
  `;
}

function renderTaskEditor(root, options) {
  const { mode, date, taskId } = options;
  const isMeal = mode === 'meal';
  const existing = taskId ? Storage.Collection.find('events', (e) => e.id === taskId) : null;

  const state = {
    title: existing ? existing.title || '' : '',
    startTime: existing ? existing.startTime || '' : '',
    memo: existing ? existing.memo || '' : '',
    steps:
      existing && existing.recipe && Array.isArray(existing.recipe.steps)
        ? existing.recipe.steps.map((s) => ({ ...s }))
        : [],
  };

  function paint() {
    root.innerHTML = `
      <div class="sheet-backdrop" id="te-backdrop">
        <div class="sheet">
          <div class="sheet__handle"></div>
          <div class="sheet__header">
            <h2 class="display" style="font-size:18px;">${existing ? 'タスクを編集' : isMeal ? '献立を追加' : '予定を追加'}</h2>
            <button class="sheet__close" id="te-close" aria-label="閉じる">${Icons.close}</button>
          </div>

          <div class="field">
            <label class="field__label" for="te-title">${isMeal ? '料理名' : '内容'}</label>
            <input id="te-title" class="input" type="text" value="${escapeHtml(state.title)}" placeholder="${isMeal ? '例：鶏肉の和風炒め' : '例：資料作成'}" />
          </div>

          <div class="field">
            <label class="field__label" for="te-start">開始時刻</label>
            <input id="te-start" class="input" type="time" value="${state.startTime}" />
          </div>

          ${
            isMeal
              ? `
          <div class="field">
            <label class="field__label">調理手順（任意）</label>
            <div id="te-steps">
              ${state.steps.map((s, i) => renderStepRow(s, i)).join('')}
            </div>
            <button type="button" id="te-add-step" class="btn btn--outline btn--sm u-mt-16">${Icons.plus} 手順を追加</button>
          </div>`
              : ''
          }

          <div class="field">
            <label class="field__label" for="te-memo">メモ（任意）</label>
            <textarea id="te-memo" class="textarea" placeholder="メモ">${escapeHtml(state.memo)}</textarea>
          </div>

          <div class="u-flex u-gap-8 u-mt-16">
            ${existing ? `<button id="te-delete" class="btn btn--danger">削除する</button>` : ''}
            <button id="te-save" class="btn ${isMeal ? 'btn--meal-primary' : 'btn--primary'} btn--block">保存する</button>
          </div>
        </div>
      </div>
    `;
    bindEvents();
  }

  function bindEvents() {
    root.querySelector('#te-backdrop').addEventListener('click', (e) => {
      if (e.target.id === 'te-backdrop') close();
    });
    root.querySelector('#te-close').addEventListener('click', () => close());

    root.querySelector('#te-title').addEventListener('input', (e) => {
      state.title = e.target.value;
    });
    root.querySelector('#te-start').addEventListener('input', (e) => {
      state.startTime = e.target.value;
    });
    root.querySelector('#te-memo').addEventListener('input', (e) => {
      state.memo = e.target.value;
    });

    if (isMeal) {
      root.querySelector('#te-add-step').addEventListener('click', () => {
        state.steps.push({ id: null, text: '', durationMinutes: 5 });
        paint();
      });
      root.querySelectorAll('.step-text').forEach((input, i) => {
        input.addEventListener('input', (e) => {
          state.steps[i].text = e.target.value;
        });
      });
      root.querySelectorAll('.step-duration').forEach((input, i) => {
        input.addEventListener('input', (e) => {
          state.steps[i].durationMinutes = e.target.value === '' ? null : Number(e.target.value);
        });
      });
      root.querySelectorAll('.remove-step').forEach((btn) => {
        btn.addEventListener('click', (e) => {
          const idx = Number(e.currentTarget.closest('.step-row').dataset.stepIndex);
          state.steps.splice(idx, 1);
          paint();
        });
      });
    }

    if (existing) {
      root.querySelector('#te-delete').addEventListener('click', () => {
        const ok = window.confirm('このタスクを削除します。よろしいですか？');
        if (!ok) return;
        Storage.Collection.remove('events', existing.id);
        window.App.toast('削除しました');
        close(true);
      });
    }

    root.querySelector('#te-save').addEventListener('click', save);
  }

  function save() {
    const title = state.title.trim();
    if (!title) {
      window.App.toast(isMeal ? '料理名を入力してください' : '内容を入力してください');
      return;
    }
    const now = new Date().toISOString();

    let recipe = null;
    if (isMeal) {
      const steps = state.steps
        .filter((s) => s.text && s.text.trim().length > 0)
        .map((s, i) => ({
          id: s.id || IdGenerator.generateId('step'),
          order: i + 1,
          text: s.text.trim(),
          durationMinutes: s.durationMinutes === undefined ? null : s.durationMinutes,
        }));
      recipe = steps.length > 0 ? { steps } : null;
    }

    if (existing) {
      const patch = {
        title,
        startTime: state.startTime || null,
        memo: state.memo,
        updatedAt: now,
      };
      if (isMeal) patch.recipe = recipe;
      Storage.Collection.update('events', existing.id, patch);
      window.App.toast('更新しました');
    } else {
      Storage.Collection.insert('events', {
        id: IdGenerator.generateId('event'),
        date,
        startTime: state.startTime || null,
        endTime: state.endTime || null,
        title,
        sourceType: 'manual',
        sourceTemplateId: null,
        sourceSuggestId: null,
        category: isMeal ? 'meal' : 'other',
        memo: state.memo,
        recipe,
        rescheduleHistory: [],
        status: 'planned',
        createdAt: now,
        updatedAt: now,
      });
      window.App.toast('追加しました');
    }
    close(true);
  }

  function close(shouldRefresh) {
    root.innerHTML = '';
    if (shouldRefresh && typeof options.onSaved === 'function') {
      options.onSaved();
    }
  }

  paint();
}

window.Screens = window.Screens || {};
window.Screens.taskEditor = renderTaskEditor;

})();


/**
 * app.js
 * 初期化・画面切り替え（ハッシュルーター）・下部ナビゲーションの描画。
 * チャット（chatPanel.js）とタスク編集（taskEditor.js）は次フェーズで接続する。
 * このフェーズでは openChat / openTaskEditor はプレースホルダーとして動作する。
 */

const NAV_ITEMS = [
  { key: 'schedule', label: '予定', icon: 'schedule' },
  { key: 'meal', label: '献立', icon: 'meal' },
  { key: 'ingredients', label: '食材メモ', icon: 'ingredients' },
  { key: 'diary', label: '日記', icon: 'diary' },
  { key: 'settings', label: '設定', icon: 'settings' },
];

const DEFAULT_ROUTE = 'schedule';

function currentRoute() {
  const hash = window.location.hash.replace(/^#\//, '');
  const valid = NAV_ITEMS.some((i) => i.key === hash);
  return valid ? hash : DEFAULT_ROUTE;
}

function renderShell() {
  const appEl = document.getElementById('app');
  appEl.innerHTML = `
    <div class="app-titlebar">
      <h1 class="app-titlebar__title">Daily Planner AI</h1>
    </div>
    <div id="screen" class="screen"></div>
    <nav class="bottom-nav">
      ${NAV_ITEMS.map(
        (item) => `
        <button class="nav-item" data-key="${item.key}" aria-label="${item.label}">
          <span class="nav-item__icon">${Icons[item.icon]}</span>
          <span>${item.label}</span>
        </button>`
      ).join('')}
    </nav>
    <div id="toast" class="toast"></div>
    <div id="modal-root"></div>
  `;

  appEl.querySelectorAll('.nav-item').forEach((btn) => {
    btn.addEventListener('click', () => {
      window.location.hash = `#/${btn.dataset.key}`;
    });
  });
}

function paintRoute() {
  const route = currentRoute();
  document.querySelectorAll('.nav-item').forEach((btn) => {
    btn.classList.toggle('is-active', btn.dataset.key === route);
  });
  const screenEl = document.getElementById('screen');
  const renderer = window.Screens[route];
  if (renderer) {
    renderer(screenEl);
  } else {
    screenEl.innerHTML = `<div class="empty-state">画面を準備中です</div>`;
  }
}

function toast(message) {
  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = message;
  el.classList.add('is-visible');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove('is-visible'), 2200);
}

/** チャットを開く。予定/献立モードは呼び出し元で固定され、履歴は独立管理される（次フェーズで実装） */
function openChat(mode, target) {
  if (!Storage.Settings.hasApiKey()) {
    toast('AIチャットを使うには設定画面でGemini APIキーを登録してください');
    return;
  }
  toast(`${mode === 'meal' ? '献立' : '予定'}チャットは次のステップで実装します`);
}

/** 手動追加・編集モーダルを開く。options: { mode: 'schedule'|'meal', date, taskId? } */
function openTaskEditor(options) {
  const modalRoot = document.getElementById('modal-root');
  if (!modalRoot || !window.Screens.taskEditor) return;
  window.Screens.taskEditor(modalRoot, {
    ...options,
    onSaved: () => paintRoute(),
  });
}

function start() {
  const settings = Storage.Settings.get();
  if (!settings.onboarded) {
    document.getElementById('app').innerHTML = '';
    window.Screens.onboarding(document.getElementById('app'));
    return;
  }
  renderShell();
  paintRoute();
}

window.addEventListener('hashchange', () => {
  if (!Storage.Settings.get().onboarded) return;
  paintRoute();
});

window.App = { start, toast, openChat, openTaskEditor, navigate: (k) => (window.location.hash = `#/${k}`) };

document.addEventListener('DOMContentLoaded', () => {
  window.App.start();
});

</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js').catch((e) => {
        console.warn('service worker registration failed', e);
      });
    });
  }
</script>
