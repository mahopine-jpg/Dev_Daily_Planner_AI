function emptyHint(mode) {
  if (mode === 'meal') {
    return `
      <div class="empty-state">
        <div class="empty-state__motif">🍳</div>
        <p class="empty-state__text">今日/明日、何を作りたいか話しかけてみましょう。<br>食材メモも参考にAIがメニュー案を出します。</p>
      </div>
    `;
  }
  return `
    <div class="empty-state">
      <div class="empty-state__motif">🗓️</div>
      <p class="empty-state__text">今日/明日の予定を相談してみましょう。<br>内容が固まったら、そのままタイムラインに反映できます。</p>
    </div>
  `;
}

function open(mode, target) {
  const modalRoot = document.getElementById('modal-root');
  if (!modalRoot) return;
  const date = DateUtils.resolveTarget(target);
  const state = { sending: false };

  function mealPhase() {
    const plan = window.MealPlanEditor.getMealPlan(date);
    if (!plan || !plan.menuConfirmed) return 'menu';
    if (!plan.steps || plan.steps.length === 0) return 'steps';
    return 'done';
  }

  function renderRescheduleSuggestionCard(s) {
    const isCancel = s.situationType === 'cancel';
    const changeLabel = isCancel
      ? `${escapeHtml(s.previousStartTime || '--:--')}〜 を中止`
      : `${escapeHtml(s.previousStartTime || '--:--')} → ${escapeHtml(s.newStartTime)}`;
    if (s.status === 'applied') {
      return `
        <div class="chat-suggest-card">
          <div class="chat-suggest-card__title">${escapeHtml(s.targetEventTitle)}</div>
          <div class="chat-suggest-card__time">${changeLabel}</div>
          <div class="chat-suggest-card__status">反映済み</div>
        </div>
      `;
    }
    if (s.status === 'dismissed') {
      return `
        <div class="chat-suggest-card is-dismissed">
          <div class="chat-suggest-card__title">${escapeHtml(s.targetEventTitle)}</div>
          <div class="chat-suggest-card__status">見送りました</div>
        </div>
      `;
    }
    return `
      <div class="chat-suggest-card">
        <div class="chat-suggest-card__label">${isCancel ? '中止の提案' : 'リスケの提案'}</div>
        <div class="chat-suggest-card__title">${escapeHtml(s.targetEventTitle)}</div>
        <div class="chat-suggest-card__time">${changeLabel}</div>
        <div class="chat-suggest-card__actions">
          <button type="button" class="btn btn--primary btn--sm chat-apply-suggest" data-suggest-id="${s.id}">反映する</button>
          <button type="button" class="btn btn--outline btn--sm chat-dismiss-suggest" data-suggest-id="${s.id}">反映しない</button>
        </div>
      </div>
    `;
  }

  function renderSuggestionCard(s) {
    if (s.type === 'reschedule') return renderRescheduleSuggestionCard(s);
    const timeLabel = s.startTime ? s.startTime + (s.endTime ? `〜${s.endTime}` : '') : '時刻未定';
    if (s.status === 'applied') {
      return `
        <div class="chat-suggest-card">
          <div class="chat-suggest-card__title">${escapeHtml(s.title)}</div>
          <div class="chat-suggest-card__time">${escapeHtml(timeLabel)}</div>
          <div class="chat-suggest-card__status">反映済み</div>
        </div>
      `;
    }
    if (s.status === 'dismissed') {
      return `
        <div class="chat-suggest-card is-dismissed">
          <div class="chat-suggest-card__title">${escapeHtml(s.title)}</div>
          <div class="chat-suggest-card__status">見送りました</div>
        </div>
      `;
    }
    return `
      <div class="chat-suggest-card">
        <div class="chat-suggest-card__title">${escapeHtml(s.title)}</div>
        <div class="chat-suggest-card__time">${escapeHtml(timeLabel)}</div>
        <div class="chat-suggest-card__actions">
          <button type="button" class="btn btn--primary btn--sm chat-apply-suggest" data-suggest-id="${s.id}">反映する</button>
          <button type="button" class="btn btn--outline btn--sm chat-dismiss-suggest" data-suggest-id="${s.id}">反映しない</button>
        </div>
      </div>
    `;
  }

  function renderMessage(m, suggestions, menuConfirmed) {
    if (m.role === 'user') {
      return `<div class="chat-bubble-row chat-bubble-row--user"><div class="chat-bubble chat-bubble--user ${mode === 'meal' ? 'chat-bubble--user--meal' : ''}">${escapeHtml(
        m.text
      ).replace(/\n/g, '<br>')}</div></div>`;
    }
    let extra = '';
    if (m.dishCandidates && m.dishCandidates.length > 0) {
      extra += `
        <div class="chat-suggest-card chat-suggest-card--meal">
          <div class="chat-suggest-card__label">候補メニュー</div>
          <div class="chat-suggest-card__dishes">${escapeHtml(m.dishCandidates.join('、'))}</div>
          ${
            menuConfirmed
              ? `<button type="button" class="btn btn--meal-primary btn--sm chat-confirm-menu" data-message-id="${m.id}" disabled>決定済み</button>`
              : `<button type="button" class="btn btn--meal-primary btn--sm chat-confirm-menu" data-message-id="${m.id}">これで決定</button>`
          }
        </div>
      `;
    }
    if (mode === 'schedule') {
      const related = suggestions.filter((s) => s.sourceMessageId === m.id);
      extra += related.map((s) => renderSuggestionCard(s)).join('');
    }
    if (m.isFallback) {
      extra += `<button type="button" class="chat-fallback" data-message-id="${m.id}">この内容をコピーしてGeminiアプリに貼り付ける</button>`;
    }
    return `
      <div class="chat-bubble-row chat-bubble-row--ai">
        <div class="chat-bubble chat-bubble--ai">${escapeHtml(m.text).replace(/\n/g, '<br>')}</div>
      </div>
      ${extra}
    `;
  }

  function paint() {
    const messages = getMessages(mode, date);
    const suggestions = mode === 'schedule' ? getSuggestions(date) : [];
    const phase = mode === 'meal' ? mealPhase() : null;
    const menuConfirmed = mode === 'meal' && phase !== 'menu';

    modalRoot.innerHTML = `
      <div class="chat-overlay">
        <div class="chat-header ${mode === 'meal' ? 'chat-header--meal' : ''}">
          <button type="button" class="chat-header__close" id="chat-close" aria-label="閉じる">${Icons.close}</button>
          <div class="chat-header__title">${mode === 'meal' ? '献立について相談' : '予定について相談'}</div>
          ${mode === 'meal' ? `<button type="button" class="chat-header__reset" id="chat-reset">やり直す</button>` : `<span style="width:32px;"></span>`}
        </div>
        <div class="chat-messages" id="chat-messages">
          ${messages.length === 0 ? emptyHint(mode) : messages.map((m) => renderMessage(m, suggestions, menuConfirmed)).join('')}
          ${
            state.sending
              ? `<div class="chat-bubble-row chat-bubble-row--ai"><div class="chat-bubble chat-bubble--ai chat-bubble--typing">…考え中</div></div>`
              : ''
          }
        </div>
        ${
          mode === 'meal' && phase === 'steps'
            ? `<div class="chat-quick-actions"><button type="button" class="btn btn--meal-primary btn--sm" id="chat-make-steps" ${state.sending ? 'disabled' : ''}>${Icons.chat} 段取りを作って</button></div>`
            : ''
        }
        ${
          mode === 'meal' && phase === 'done'
            ? `<div class="chat-quick-actions"><button type="button" class="btn btn--meal-primary btn--sm" id="chat-view-timeline">タイムラインを見る</button></div>`
            : ''
        }
        <div class="chat-input-bar">
          <textarea id="chat-input" class="textarea chat-input-bar__textarea" rows="1" placeholder="${
            mode === 'meal' ? '食べたい物や気分を伝えてみましょう' : '今日の予定について相談してみましょう'
          }" ${state.sending ? 'disabled' : ''}></textarea>
          <button type="button" class="chat-input-bar__send ${mode === 'meal' ? 'chat-input-bar__send--meal' : ''}" id="chat-send" aria-label="送信" ${state.sending ? 'disabled' : ''}>${Icons.send}</button>
        </div>
      </div>
    `;
    bind();
    const messagesEl = modalRoot.querySelector('#chat-messages');
    if (messagesEl) messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function closeAndGoTo(routeKey) {
    modalRoot.innerHTML = '';
    window.location.hash = `#/${routeKey}`;
    window.App.refresh();
  }

  async function runTurn({ userText, schema, systemInstruction, afterAssistant }) {
    if (state.sending) return;
    if (!checkAndRecordRateLimit()) {
      window.App.toast('送信回数が多くなっています。少し時間をおいてからお試しください。');
      return;
    }
    if (userText) addMessage(mode, date, 'user', userText);
    state.sending = true;
    paint();

    try {
      const apiKey = Storage.Settings.get().geminiApiKey;
      const history = getMessages(mode, date).map((m) => ({ role: m.role, text: m.text }));
      const result = await callGemini({ apiKey, systemInstruction, history, responseSchema: schema });
      const aiMsg = addMessage(mode, date, 'assistant', result.reply || '…');
      if (typeof afterAssistant === 'function') afterAssistant(result, aiMsg);
    } catch (err) {
      console.error('[chatPanel] gemini call failed', err);
      const history = getMessages(mode, date).map((m) => ({ role: m.role, text: m.text }));
      addMessage(mode, date, 'assistant', describeGeminiError(err), {
        isFallback: true,
        manualPromptText: buildManualPromptText(mode, date, history),
      });
    } finally {
      state.sending = false;
      paint();
    }
  }

  function handleSend() {
    const textarea = modalRoot.querySelector('#chat-input');
    if (!textarea) return;
    const text = textarea.value.trim();
    if (!text) return;
    textarea.value = '';

    if (mode === 'schedule') {
      runTurn({
        userText: text,
        schema: SCHEDULE_SCHEMA,
        systemInstruction: buildScheduleSystemPrompt(date),
        afterAssistant: (result, aiMsg) => {
          if (Array.isArray(result.suggestions)) {
            result.suggestions.forEach((sg) => {
              if (sg && sg.title && sg.startTime && sg.startTime.trim()) addSuggestion(date, aiMsg.id, sg);
            });
          }
          if (Array.isArray(result.rescheduleSuggestions)) {
            result.rescheduleSuggestions.forEach((rs) => {
              if (!rs || !rs.targetEventId) return;
              const situationType = rs.situationType === 'cancel' ? 'cancel' : 'postpone';
              // postponeは新しい時刻が必須。cancelは時刻不要
              if (situationType === 'postpone' && (!rs.newStartTime || !rs.newStartTime.trim())) return;
              // AIがIDを取り違えている可能性があるため、この日の実在タスクかどうかを必ず確認する
              const targetEvent = Storage.Collection.find(
                'events',
                (e) => e.id === rs.targetEventId && e.date === date && e.status !== 'skipped'
              );
              if (!targetEvent) return;
              addRescheduleSuggestion(date, aiMsg.id, { ...rs, situationType }, targetEvent);
            });
          }
        },
      });
    } else {
      runTurn({
        userText: text,
        schema: MEAL_MENU_SCHEMA,
        systemInstruction: buildMealMenuSystemPrompt(date),
        afterAssistant: (result, aiMsg) => {
          if (Array.isArray(result.dishCandidates) && result.dishCandidates.length > 0) {
            Storage.Collection.update('messages', aiMsg.id, { dishCandidates: result.dishCandidates });
          }
        },
      });
    }
  }

  function handleMakeSteps() {
    runTurn({
      userText: '段取りを作って',
      schema: MEAL_STEPS_SCHEMA,
      systemInstruction: buildMealStepsSystemPrompt(date),
      afterAssistant: (result) => {
        if (Array.isArray(result.steps) && result.steps.length > 0) {
          const newSteps = result.steps.map((s, i) => ({
            id: IdGenerator.generateId('step'),
            order: i + 1,
            title: s.title || '',
            description: s.description || '',
            durationMinutes: typeof s.durationMinutes === 'number' ? s.durationMinutes : null,
          }));
          window.MealPlanEditor.saveMealPlan(date, { steps: newSteps });
        }
      },
    });
  }

  function bind() {
    modalRoot.querySelector('#chat-close').addEventListener('click', () => {
      closeAndGoTo(mode === 'meal' ? 'meal' : 'schedule');
    });

    const resetBtn = modalRoot.querySelector('#chat-reset');
    if (resetBtn) {
      resetBtn.addEventListener('click', () => {
        const ok = window.confirm('この日の献立（メニュー・工程とも）と、ここでの会話履歴をすべて削除して最初からやり直します。よろしいですか？');
        if (!ok) return;
        resetMealChat(date);
        window.App.toast('やり直しました');
        paint();
      });
    }

    const sendBtn = modalRoot.querySelector('#chat-send');
    if (sendBtn) sendBtn.addEventListener('click', handleSend);

    const textarea = modalRoot.querySelector('#chat-input');
    if (textarea) {
      textarea.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          handleSend();
        }
      });
    }

    const makeStepsBtn = modalRoot.querySelector('#chat-make-steps');
    if (makeStepsBtn) makeStepsBtn.addEventListener('click', handleMakeSteps);

    const viewTimelineBtn = modalRoot.querySelector('#chat-view-timeline');
    if (viewTimelineBtn) viewTimelineBtn.addEventListener('click', () => closeAndGoTo('meal'));

    modalRoot.querySelectorAll('.chat-confirm-menu').forEach((btn) => {
      btn.addEventListener('click', () => {
        const msg = Storage.Collection.find('messages', (m) => m.id === btn.dataset.messageId);
        if (!msg || !msg.dishCandidates) return;
        window.MealPlanEditor.saveMealPlan(date, { dishes: msg.dishCandidates, menuConfirmed: true });
        window.App.toast('メニューを決定しました');
        paint();
      });
    });

    modalRoot.querySelectorAll('.chat-apply-suggest').forEach((btn) => {
      btn.addEventListener('click', () => {
        const sug = Storage.Collection.find('suggestions', (s) => s.id === btn.dataset.suggestId);
        if (!sug) return;
        if (sug.type === 'reschedule') {
          const evt = applyRescheduleSuggestion(sug);
          window.App.toast(
            evt ? (sug.situationType === 'cancel' ? '中止を反映しました' : 'リスケを反映しました') : 'この予定はすでに削除されているため反映できませんでした'
          );
        } else {
          applySuggestion(sug);
          window.App.toast('タイムラインに反映しました');
        }
        paint();
      });
    });

    modalRoot.querySelectorAll('.chat-dismiss-suggest').forEach((btn) => {
      btn.addEventListener('click', () => {
        const sug = Storage.Collection.find('suggestions', (s) => s.id === btn.dataset.suggestId);
        if (!sug) return;
        dismissSuggestion(sug);
        paint();
      });
    });

    modalRoot.querySelectorAll('.chat-fallback').forEach((btn) => {
      btn.addEventListener('click', async () => {
        const msg = Storage.Collection.find('messages', (m) => m.id === btn.dataset.messageId);
        if (!msg || !msg.manualPromptText) return;
        try {
          await navigator.clipboard.writeText(msg.manualPromptText);
          window.App.toast('コピーしました。Geminiアプリに貼り付けてご利用ください。');
        } catch (e) {
          window.App.toast('コピーに失敗しました。手動で選択してコピーしてください。');
        }
      });
    });
  }

  paint();
}

window.ChatPanel = { open };

})();


/**
 * app.js
 * 初期化・画面切り替え（ハッシュルーター）・下部ナビゲーションの描画。
 */

const NAV_ITEMS = [
  { key: 'schedule', label: '予定', icon: 'schedule' },
  { key: 'meal', label: '献立', icon: 'meal' },
  { key: 'ingredients', label: '食材メモ', icon: 'ingredients' },
  { key: 'diary', label: '日記', icon: 'diary' },
  { key: 'settings', label: '設定', icon: 'settings' },
];

const DEFAULT_ROUTE = 'schedule';

/** 下部ナビの5タブには含めないが、遷移先として有効な画面（設定画面からの遷移先など） */
const EXTRA_ROUTES = ['baseSchedule'];

function currentRoute() {
  const hash = window.location.hash.replace(/^#\//, '');
  const valid = NAV_ITEMS.some((i) => i.key === hash) || EXTRA_ROUTES.includes(hash);
  return valid ? hash : DEFAULT_ROUTE;
}

function renderShell() {
  const appEl = document.getElementById('app');
  appEl.innerHTML = `
    <div class="app-titlebar">
      <h1 class="app-titlebar__title">Daily Planner AI</h1>
    </div>
    <div id="screen" class="screen"></div>
    <nav class="bottom-nav">
      ${NAV_ITEMS.map(
        (item) => `
        <button class="nav-item" data-key="${item.key}" aria-label="${item.label}">
          <span class="nav-item__icon">${Icons[item.icon]}</span>
          <span>${item.label}</span>
        </button>`
      ).join('')}
    </nav>
    <div id="toast" class="toast"></div>
    <div id="modal-root"></div>
  `;

  appEl.querySelectorAll('.nav-item').forEach((btn) => {
    btn.addEventListener('click', () => {
      window.location.hash = `#/${btn.dataset.key}`;
    });
  });
}

function paintRoute() {
  const route = currentRoute();
  document.querySelectorAll('.nav-item').forEach((btn) => {
    btn.classList.toggle('is-active', btn.dataset.key === route);
  });
  const screenEl = document.getElementById('screen');
  const renderer = window.Screens[route];
  if (renderer) {
    renderer(screenEl);
  } else {
    screenEl.innerHTML = `<div class="empty-state">画面を準備中です</div>`;
  }
}

function toast(message) {
  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = message;
  el.classList.add('is-visible');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove('is-visible'), 2200);
}

/** チャットを開く。予定/献立モードは呼び出し元で固定され、履歴は独立管理される */
function openChat(mode, target) {
  if (!Storage.Settings.hasApiKey()) {
    toast('AIチャットを使うには設定画面でGemini APIキーを登録してください');
    return;
  }
  if (!window.ChatPanel) return;
  window.ChatPanel.open(mode, target);
}

/** 手動追加・編集モーダルを開く。options: { mode: 'schedule'|'meal', date, taskId? } */
function openTaskEditor(options) {
  const modalRoot = document.getElementById('modal-root');
  if (!modalRoot || !window.Screens.taskEditor) return;
  window.Screens.taskEditor(modalRoot, {
    ...options,
    onSaved: () => paintRoute(),
  });
}

function start() {
  window.DataRetention.purgeOldData();

  const settings = Storage.Settings.get();
  if (!settings.onboarded) {
    document.getElementById('app').innerHTML = '';
    window.Screens.onboarding(document.getElementById('app'));
    return;
  }
  renderShell();
  paintRoute();
}

window.addEventListener('hashchange', () => {
  if (!Storage.Settings.get().onboarded) return;
  paintRoute();
});

window.App = {
  start,
  toast,
  openChat,
  openTaskEditor,
  navigate: (k) => (window.location.hash = `#/${k}`),
  refresh: () => paintRoute(),
};

document.addEventListener('DOMContentLoaded', () => {
  window.App.start();
});

</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js').catch((e) => {
        console.warn('service worker registration failed', e);
      });
    });
  }
</script>
