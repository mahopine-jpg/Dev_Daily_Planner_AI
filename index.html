/* ==========================================================================
   Daily Planner AI - Design Tokens & Base Styles
   ========================================================================== */

@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Fredoka:wght@600;700&display=swap');

:root {
  /* --- Color: base palette (Image1トーン) --- */
  --bg-cream: #F7EFDD;
  --bg-cream-deep: #F0E4C9;
  --surface: #FFFDF8;
  --surface-alt: #FBF6EA;

  --ink: #2E2440;
  --ink-muted: #7C7189;
  --ink-faint: #A79CB5;

  --primary: #6E4FA0;
  --primary-dark: #543C82;
  --primary-soft: #D9CDEF;
  --primary-pale: #EFE8F8;

  /* --- Color: cute accent (Image2由来、控えめに使用) --- */
  --accent-blush: #F1B3C4;
  --accent-blush-pale: #FBE3E9;

  /* --- Color: category coding --- */
  --cat-life: #B9AEE0;      /* 基本スケジュール */
  --cat-ai: #6E4FA0;        /* AI相談で組んだ予定 */
  --cat-manual: #FFFFFF;    /* 手動追加 */
  --cat-meal: #E8935E;      /* 献立 */
  --cat-meal-pale: #FBE6D7; /* 献立まわりの「非選択・淡色」用（--primary-paleの献立版） */

  --success: #6FA07C;
  --danger: #C2665F;

  /* --- Type --- */
  --font-display: 'Zen Maru Gothic', 'M PLUS Rounded 1c', sans-serif;
  --font-body: 'M PLUS Rounded 1c', 'Zen Maru Gothic', sans-serif;

  /* --- Radius / Shadow --- */
  --radius-lg: 22px;
  --radius-md: 16px;
  --radius-sm: 10px;
  --radius-pill: 999px;

  --shadow-card: 0 2px 10px rgba(110, 79, 160, 0.08);
  --shadow-float: 0 6px 20px rgba(110, 79, 160, 0.22);

  /* --- Layout --- */
  --nav-height: 64px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --header-height: 56px;
  --content-max-width: 480px;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  height: 100dvh; /* 2026-07-13追記：iOS Safariの100vh/height:100%は「UIが最小化された時の最大表示領域」を
                     基準にすることがあり、実際に見えている表示領域より大きく計算されることで、
                     固定表示の下部ナビとの間にクリーム色の隙間が生まれる原因になっていた。
                     100dvhは実際に見えている表示領域を常に反映するため、これに差し替える
                     （非対応の古いブラウザでは上のheight:100%がそのまま使われる） */
  background: var(--bg-cream);
  color: var(--ink);
  font-family: var(--font-body);
  -webkit-tap-highlight-color: transparent;
  overflow-x: hidden; /* 個々の要素の横はみ出しが万一残っていても、画面全体の横スクロールは起きないようにする保険 */
}

body {
  overscroll-behavior-y: contain;
}

h1, h2, h3, .display {
  font-family: var(--font-display);
  font-weight: 700;
  color: var(--ink);
  margin: 0;
}

p { margin: 0; }

button, input, textarea, select {
  font-family: inherit;
  color: inherit;
}

button {
  border: none;
  background: none;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

a { color: var(--primary); }

::placeholder {
  color: var(--ink-faint);
}

/* --- App shell --- */
#app {
  max-width: var(--content-max-width);
  margin: 0 auto;
  min-height: 100%;
  background: var(--bg-cream);
  position: relative;
  display: flex;
  flex-direction: column;
}

.screen {
  flex: 1;
  padding-bottom: calc(var(--nav-height) + var(--safe-bottom) + 12px);
  min-height: 100vh;
  min-height: 100dvh;
}

.app-header {
  background: var(--bg-cream);
  padding: 10px 20px 10px;
}

.app-header__title {
  font-size: 20px;
  letter-spacing: 0.02em;
}

.app-header__subtitle {
  margin-top: 2px;
  font-size: 13px;
  color: var(--ink-muted);
}

/* --- App title bar (全画面共通、最上部) --- */
.app-titlebar {
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 12;
  text-align: center;
  padding: calc(env(safe-area-inset-top, 0px) + 18px) 16px 14px;
  background: var(--bg-cream);
}

.app-titlebar__title {
  font-family: 'Fredoka', var(--font-display);
  font-weight: 700;
  font-size: 32px;
  letter-spacing: 0.01em;
  line-height: 1.1;
  background: linear-gradient(90deg, var(--primary) 0%, #9B6FC9 50%, var(--accent-blush) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

/* --- Bottom navigation --- */
.bottom-nav {
  position: fixed;
  left: 50%;
  transform: translateX(-50%);
  bottom: 0;
  width: 100%;
  max-width: var(--content-max-width);
  height: calc(var(--nav-height) + var(--safe-bottom));
  background: var(--surface);
  border-top: 1px solid rgba(110, 79, 160, 0.12);
  display: flex;
  align-items: stretch;
  justify-content: space-around;
  z-index: 20;
  padding-bottom: var(--safe-bottom);
}

.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  font-size: 11px;
  color: var(--ink-faint);
  padding: 6px 2px;
}

.nav-item__icon {
  width: 22px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.nav-item.is-active {
  color: var(--primary);
  font-weight: 700;
}

/* --- Segmented control (today/tomorrow) --- */
.segmented {
  display: flex;
  background: var(--primary-pale);
  border-radius: var(--radius-pill);
  padding: 4px;
  gap: 4px;
}

.segmented__option {
  flex: 1;
  text-align: center;
  padding: 9px 0;
  border-radius: var(--radius-pill);
  font-weight: 700;
  font-size: 14px;
  color: var(--primary-dark);
  transition: background 0.15s ease, color 0.15s ease;
}

.segmented__option.is-selected {
  background: var(--primary);
  color: #fff;
}

/* --- 献立タブ用の差し色バリエーション（予定タブとの視覚的な区別） --- */
.segmented--meal {
  background: var(--cat-meal-pale); /* 2026-07-13追記：選択中の色だけ献立トーンに変えていて、
                                        非選択側の背景が--primary-paleのまま残っていた見落としを修正 */
}

.segmented--meal .segmented__option {
  color: var(--cat-meal);
}

.segmented--meal .segmented__option.is-selected {
  background: var(--cat-meal);
  color: #fff;
}

.btn--meal-primary {
  background: var(--cat-meal);
  color: #fff;
  box-shadow: 0 6px 20px rgba(232, 147, 94, 0.32);
}

.fab.fab--meal {
  background: var(--cat-meal);
  box-shadow: 0 6px 20px rgba(232, 147, 94, 0.32);
}

.empty-state--meal .empty-state__motif {
  filter: none;
}

.app-header--meal .app-header__title {
  color: var(--cat-meal);
}

/* --- Cards --- */
.card {
  background: var(--surface);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
  padding: 16px;
}

.card--outline {
  background: var(--surface);
  border: 1.5px solid var(--primary-soft);
  box-shadow: none;
}

/* --- Buttons --- */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  border-radius: var(--radius-pill);
  font-weight: 700;
  font-size: 15px;
  padding: 13px 22px;
  transition: transform 0.1s ease, opacity 0.15s ease;
}

.btn:active { transform: scale(0.97); }

.btn--primary {
  background: var(--primary);
  color: #fff;
  box-shadow: var(--shadow-float);
}

.btn--secondary {
  background: var(--primary-pale);
  color: var(--primary-dark);
}

.btn--outline {
  background: transparent;
  border: 1.5px solid var(--primary-soft);
  color: var(--primary-dark);
}

.btn--danger {
  background: transparent;
  color: var(--danger);
}

.btn:disabled {
  opacity: 0.4;
  pointer-events: none;
}

.btn--block { width: 100%; }

.btn--sm {
  padding: 8px 16px;
  font-size: 13px;
}

.fab {
  position: fixed;
  right: calc(50% - var(--content-max-width) / 2 + 20px);
  bottom: calc(var(--nav-height) + var(--safe-bottom) + 18px);
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: var(--primary);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow-float);
  font-size: 26px;
  z-index: 15;
}

@media (max-width: 480px) {
  .fab { right: 20px; }
}

/* --- Forms --- */
.field {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 16px;
}

.field__label {
  font-size: 13px;
  font-weight: 700;
  color: var(--ink-muted);
}

.input, .textarea, .select {
  background: var(--surface);
  border: 1.5px solid var(--primary-soft);
  border-radius: var(--radius-md);
  padding: 12px 14px;
  font-size: 16px; /* iOS Safariは16px未満のフォーカス時に自動ズームするため、16px以上を維持する（レイアウト崩れ・ボタン押下不能の原因になる） */
  color: var(--ink);
  width: 100%;
  min-width: 0; /* flexコンテナ(.field等)の子要素になった際、内容量に応じて広がってしまう既定挙動(min-width:auto)を無効化する */
  box-sizing: border-box;
}

/*
 * 2026-07-12 追記：input[type="time"]は、display:block/width:100%等のCSSだけでは
 * 安定して枠内に収まらないことがある（iOS Safari側の内部レイアウトが独自の最小幅を
 * 要求し、指定した幅を無視して右にはみ出すことがある）。appearance:noneで装飾ごと外す
 * 対策も試したが、今度は時刻表示自体が描画されなくなる副作用が出たため不採用とした。
 *
 * そのため、input自体の幅指定に加えて、親に overflow:hidden の専用ラッパー
 * (.time-input-wrap) を追加し、中身がどんな幅を要求してきても、ラッパーの外枠からは
 * 物理的にはみ出せないようにする（見た目の「枠」を確実に固定する目的の対策）。
 */
/*
 * 2026-07-13追記（実機再検証）：min-width:0やmask-imageを重ねても直らなかった。
 * ChatGPTの分析および複数の報告によると、iOS Safari（26.5.x系）には
 * 「input[type="time"]にpaddingとwidth:100%を同時指定すると、幅の計算自体が
 * 崩れて右にはみ出す」という既知バグがある（box-sizing:border-boxを指定していても発生する）。
 * 対策として、paddingとborder/backgroundをinput自身からは完全に外し、
 * 代わりに.time-input-wrap側にそれらを持たせる。inputは中身の文字だけを描画する
 * 透明な要素にし、paddingを一切持たないようにすることで、バグの発生条件そのものを避ける。
 */
input[type="time"],
input[type="date"] {
  display: block;
  width: 100% !important;
  min-width: 0 !important;
  max-width: 100%;
  box-sizing: border-box;
}

.time-input-wrap {
  width: 100%;
  min-width: 0; /* このラッパー自身が.fieldのflexアイテムになるため、min-widthを明示しないと
                   中身(input)の最小幅ぶん広がってしまい、overflow:hiddenが機能しなくなる */
  overflow: hidden;
  border-radius: var(--radius-md);
  border: 1.5px solid var(--primary-soft);
  background: var(--surface);
  padding: 0 14px; /* 見た目の左右余白はここで持つ（inputには持たせない） */
  box-sizing: border-box;
  position: relative;
  -webkit-mask-image: -webkit-radial-gradient(white, black); /* Safariのoverflow:hidden+border-radius
                                                                  クリップ不具合への保険として残す */
  transform: translateZ(0);
}

.time-input-wrap input[type="time"],
.time-input-wrap input[type="date"] {
  padding: 12px 0 !important; /* 上下のpaddingのみ。左右はラッパーのpaddingで確保することで、
                                  input自身にはpadding+width:100%の組み合わせを作らせない */
  margin: 0;
  border: none;
  background: transparent;
  font-size: 16px;
  color: var(--ink);
}

.input:focus, .textarea:focus, .select:focus {
  outline: none;
  border-color: var(--primary);
}

.textarea {
  resize: vertical;
  min-height: 90px;
  line-height: 1.6;
  font-family: var(--font-body);
}

.hint {
  font-size: 12px;
  color: var(--ink-muted);
  line-height: 1.5;
}

/* --- Empty state --- */
.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--ink-muted);
}

.empty-state__motif {
  font-size: 34px;
  margin-bottom: 10px;
  opacity: 0.7;
}

.empty-state__text {
  font-size: 14px;
  line-height: 1.7;
}

/* --- Modal / bottom sheet --- */
.sheet-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(46, 36, 64, 0.35);
  z-index: 30;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}

.sheet {
  width: 100%;
  max-width: var(--content-max-width);
  background: var(--surface);
  border-radius: 24px 24px 0 0;
  max-height: 88vh;
  overflow-y: auto;
  overflow-x: hidden; /* 内部要素(time input等)が万一はみ出しても、シート自体は横スクロールさせない保険 */
  box-sizing: border-box;
  padding: 10px 20px calc(24px + env(safe-area-inset-bottom, 0));
  animation: sheet-up 0.22s ease-out;
}

@keyframes sheet-up {
  from { transform: translateY(24px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.sheet__handle {
  width: 40px;
  height: 4px;
  border-radius: var(--radius-pill);
  background: var(--primary-soft);
  margin: 6px auto 14px;
}

.sheet__header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.sheet__close {
  font-size: 20px;
  color: var(--ink-muted);
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* --- Toast --- */
.toast {
  position: fixed;
  left: 50%;
  bottom: calc(var(--nav-height) + var(--safe-bottom) + 16px);
  transform: translateX(-50%);
  background: var(--ink);
  color: #fff;
  padding: 10px 18px;
  border-radius: var(--radius-pill);
  font-size: 13px;
  z-index: 50;
  box-shadow: var(--shadow-float);
  opacity: 0;
  transition: opacity 0.2s ease;
  pointer-events: none;
}

.toast.is-visible { opacity: 1; }

/* --- Timeline (schedule/meal tabs) --- */
.timeline {
  position: relative;
  padding-left: 6px;
}

.timeline__row {
  display: grid;
  grid-template-columns: 44px 20px 1fr;
  align-items: stretch; /* 2026-07-13修正：start だと.timeline__nodeの高さがカードより短くなり、
                            線(::before)がカードの下端まで届かず途切れて見えていた。
                            stretchにして.timeline__nodeをカードと同じ高さまで伸ばすことで、
                            線が常にカードの下端（＝次の行との隙間）まで届くようにする。 */
  margin-bottom: 14px;
}

.timeline__time {
  font-size: 12px;
  font-weight: 700;
  color: var(--ink-muted);
  padding-top: 14px;
}

.timeline__node {
  position: relative;
  display: flex;
  justify-content: center;
}

.timeline__node::before {
  content: '';
  position: absolute;
  top: 0;
  bottom: -14px;
  width: 2px;
  background: var(--primary-soft);
}

.timeline__row:last-child .timeline__node::before {
  bottom: 0; /* 最後の行は次の行がないので、余分に線を伸ばさない */
}

.timeline__node::after {
  content: '';
  width: 10px;
  height: 10px;
  margin-top: 16px;
  border-radius: 40% 60% 60% 40% / 50% 40% 60% 50%; /* 花形のシグネチャーノード */
  background: var(--primary);
  z-index: 1;
}

.timeline__card {
  position: relative;
  padding: 12px 40px 12px 14px;
}

.timeline__card--is-life { border-left: 4px solid var(--cat-life); }
.timeline__card--is-ai { border-left: 4px solid var(--cat-ai); }
.timeline__card--is-manual { border-left: 4px solid var(--ink-faint); }
.timeline__card--is-meal { border-left: 4px solid var(--cat-meal); }

.timeline__delete {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 26px;
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink-faint);
}

.timeline__card-main {
  display: flex;
  align-items: flex-start;
  gap: 10px;
}

.timeline__check {
  flex-shrink: 0;
  width: 24px;
  height: 24px;
  margin-top: 1px;
  border-radius: 50%;
  border: 1.8px solid var(--primary-soft);
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
}

.timeline__check.is-checked {

<body>
<div id="app"></div>

<script>
/**
 * storage.js
 * localStorageラッパー（データ層）。
 * 将来 Google Drive 等に保存先を差し替える際も、呼び出し側は
 * このモジュールのインターフェース（get/set/list/remove）だけに依存する。
 */

const NS = 'dailyplanner-ai:v1:';

function key(k) {
  return NS + k;
}

/** JSONとして値を取得。存在しなければ fallback を返す */
function get(k, fallback = null) {
  try {
    const raw = localStorage.getItem(key(k));
    if (raw === null) return fallback;
    return JSON.parse(raw);
  } catch (e) {
    console.error('[storage.get] failed', k, e);
    return fallback;
  }
}

/** JSONとして値を保存 */
function set(k, value) {
  try {
    localStorage.setItem(key(k), JSON.stringify(value));
    return true;
  } catch (e) {
    console.error('[storage.set] failed', k, e);
    return false;
  }
}

function remove(k) {
  localStorage.removeItem(key(k));
}

/** 指定プレフィックスに一致する全キー（NSを除いた素のキー）を返す */
function listKeys(prefix = '') {
  const result = [];
  for (let i = 0; i < localStorage.length; i++) {
    const fullKey = localStorage.key(i);
    if (fullKey && fullKey.startsWith(NS)) {
      const bare = fullKey.slice(NS.length);
      if (bare.startsWith(prefix)) result.push(bare);
    }
  }
  return result;
}

/* ------------------------------------------------------------------ */
/* コレクション操作（エンティティを配列としてまとめて保存する簡易方式） */
/* ------------------------------------------------------------------ */

/**
 * コレクション名（例: "events", "baseSchedules", "ingredients"）単位で
 * 配列として読み書きする。デバイス内で完結するv1では十分な粒度。
 */
const Collection = {
  all(name) {
    return get(`col:${name}`, []);
  },
  save(name, items) {
    return set(`col:${name}`, items);
  },
  find(name, predicate) {
    return Collection.all(name).find(predicate) || null;
  },
  filter(name, predicate) {
    return Collection.all(name).filter(predicate);
  },
  insert(name, item) {
    const items = Collection.all(name);
    items.push(item);
    Collection.save(name, items);
    return item;
  },
  update(name, id, patch) {
    const items = Collection.all(name);
    const idx = items.findIndex((i) => i.id === id);
    if (idx === -1) return null;
    items[idx] = { ...items[idx], ...patch };
    Collection.save(name, items);
    return items[idx];
  },
  remove(name, id) {
    const items = Collection.all(name);
    const next = items.filter((i) => i.id !== id);
    Collection.save(name, next);
    return next.length !== items.length;
  },
};

/* ------------------------------------------------------------------ */
/* 設定（APIキー・テーマ等）                                          */
/* ------------------------------------------------------------------ */

const Settings = {
  DEFAULTS: { geminiApiKey: '', theme: 'light', onboarded: false },
  get() {
    return { ...Settings.DEFAULTS, ...get('settings', {}) };
  },
  update(patch) {
    const next = { ...Settings.get(), ...patch };
    set('settings', next);
    return next;
  },
  hasApiKey() {
    const s = Settings.get();
    return typeof s.geminiApiKey === 'string' && s.geminiApiKey.trim().length > 0;
  },
};

window.Storage = { get, set, remove, listKeys, Collection, Settings };


/**
 * idGenerator.js
 * 設計書のID命名規則（EVT-/BASE-/STEP-/ING-/MSG-/SUGGEST-/DIARY-）に従い、
 * 連番カウンタをlocalStorageで管理する軽量な採番を行う。
 * デバイス内で完結するため衝突の心配はない。
 */

const PREFIXES = {
  event: 'EVT',
  baseSchedule: 'BASE',
  step: 'STEP',
  ingredient: 'ING',
  message: 'MSG',
  suggestion: 'SUGGEST',
};
/* 注: step プレフィックスは元々定義済み。手動編集フェーズで taskEditor.js から使用開始。 */

function nextSeq(counterName) {
  const counters = window.Storage.get('idCounters', {});
  const next = (counters[counterName] || 0) + 1;
  counters[counterName] = next;
  window.Storage.set('idCounters', counters);
  return next;
}

function pad(n, len = 6) {
  return String(n).padStart(len, '0');
}

function generateId(type) {
  const prefix = PREFIXES[type];
  if (!prefix) throw new Error(`unknown id type: ${type}`);
  const seq = nextSeq(type);
  return `${prefix}-${pad(seq)}`;
}

/** 日記IDは日付そのもの（1日1件のため） */
function diaryIdForDate(dateStr) {
  return `DIARY-${dateStr.replace(/-/g, '')}`;
}

/** 献立プランIDも日付そのもの（対象日1日につき1件のため） */
function mealPlanIdForDate(dateStr) {
  return `MEALPLAN-${dateStr.replace(/-/g, '')}`;
}

window.IdGenerator = { generateId, diaryIdForDate, mealPlanIdForDate };


/**
 * dateUtils.js
 * 「今日/明日」の判定、基本スケジュールの曜日一致判定などの日付処理。
 */

const DOW_KEYS = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'];
const DOW_LABEL_JA = ['日', '月', '火', '水', '木', '金', '土'];

function toDateStr(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function todayStr() {
  return toDateStr(new Date());
}

function tomorrowStr() {
  const d = new Date();
  d.setDate(d.getDate() + 1);
  return toDateStr(d);
}

/** dateStr（YYYY-MM-DD）に days 日を加減算した日付文字列を返す（日記の日付ナビ等で使用） */
function addDays(dateStr, days) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + days);
  return toDateStr(d);
}

/** "today" | "tomorrow" を実際の日付文字列に変換 */
function resolveTarget(target) {
  return target === 'tomorrow' ? tomorrowStr() : todayStr();
}

function dayOfWeekKey(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return DOW_KEYS[d.getDay()];
}

function formatDateLabel(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const dow = DOW_LABEL_JA[d.getDay()];
  return `${d.getMonth() + 1}月${d.getDate()}日（${dow}）`;
}

window.DateUtils = {
  toDateStr,
  todayStr,
  tomorrowStr,
  addDays,

/**
 * dataRetention.js
 * 日記・予定・献立プランは「直近7日分（今日〜6日前）」のみ保持し、
 * それより古いデータはアプリ起動時に自動削除する。
 * 食材メモ（ingredients）と基本スケジュールのテンプレート（baseSchedules）は対象外。
 * 日付文字列（YYYY-MM-DD）は文字列比較でそのまま新旧判定できる。
 */

(function () {
  'use strict';

const RETENTION_DAYS = 7;
const TARGET_COLLECTIONS = ['events', 'mealPlans', 'diaries'];

function purgeOldData() {
  const cutoff = DateUtils.addDays(DateUtils.todayStr(), -(RETENTION_DAYS - 1));
  TARGET_COLLECTIONS.forEach((name) => {
    const items = Storage.Collection.all(name);
    const kept = items.filter((item) => !item.date || item.date >= cutoff);
    if (kept.length !== items.length) {
      Storage.Collection.save(name, kept);
    }
  });
}

window.DataRetention = { purgeOldData };

})();

/**
 * scheduleTab.js
 * 「予定タブ」：献立以外のタスクを今日/明日で切り替えて時系列表示する。
 * FR-0 / FR-1 / FR-4 / FR-5 に対応。
 * 手動追加・編集（FR-6）とAI相談（FR-1）は次フェーズで接続する。
 * このフェーズでは、タイムラインの描画とデータ層の疎通のみを実装する。
 */

(function () {
  'use strict';

function getEventsFor(dateStr) {
  // 基本スケジュール由来の当日インスタンスを未生成なら生成する
  ensureBaseScheduleInstances(dateStr);
  // 献立は MEALPLAN として別コレクションで管理するため、ここでのフィルタは不要
  // （2026-07-12: category:"meal" のEVTは廃止。旧テスト投入データが残っていても単に無視される）
  // status:'skipped'（基本スケジュール由来の予定を「この日だけ削除」した記録）は表示しない。
  // 削除せず残すのは、ensureBaseScheduleInstances が「その日・そのテンプレートのEVTが
  // 存在するか」だけで再生成要否を判断しているため（完全に削除すると次の描画で復活してしまう）。
  return Storage.Collection.filter('events', (e) => e.date === dateStr && e.status !== 'skipped').sort((a, b) =>
    (a.startTime || '').localeCompare(b.startTime || '')
  );
}

function ensureBaseScheduleInstances(dateStr) {
  const dow = DateUtils.dayOfWeekKey(dateStr);
  const templates = Storage.Collection.filter('baseSchedules', (t) =>
    (t.daysOfWeek || []).includes(dow)
  );
  const existing = Storage.Collection.filter(
    'events',
    (e) => e.date === dateStr && e.sourceType === 'base_schedule'
  );
  const existingTemplateIds = new Set(existing.map((e) => e.sourceTemplateId));

  templates.forEach((tpl) => {
    if (existingTemplateIds.has(tpl.id)) return;
    const now = new Date().toISOString();
    Storage.Collection.insert('events', {
      id: IdGenerator.generateId('event'),
      date: dateStr,
      startTime: tpl.startTime,
      endTime: null,
      title: tpl.title,
      sourceType: 'base_schedule',
      sourceTemplateId: tpl.id,
      sourceSuggestId: null,
      category: 'life',
      memo: tpl.memo || '',
      rescheduleHistory: null, // FR-7：リスケすると{from,changedAt,note}が入る（直近1件のみ保持）
      status: 'planned',
      createdAt: now,
      updatedAt: now,
    });
  });
}

function categoryBadge(event) {
  if (event.sourceType === 'base_schedule') return { label: '基本スケジュール', cls: 'is-life' };
  if (event.sourceType === 'ai_chat') return { label: 'AI相談で組んだ予定', cls: 'is-ai' };
  return { label: '手動追加', cls: 'is-manual' };
}

function renderTimeline(events) {
  if (events.length === 0) {
    return `
      <div class="empty-state">
        <div class="empty-state__motif">🌸</div>
        <p class="empty-state__text">
          まだ予定がありません。<br>
          「予定について相談」するか、右下の＋から追加してみましょう。
        </p>
      </div>
    `;
  }

  return `
    <div class="timeline">
      ${events
        .map((e) => {
          const badge = categoryBadge(e);
          const isDone = e.status === 'done';
          return `
            <div class="timeline__row" data-task-id="${e.id}">
              <div class="timeline__time">${e.startTime || '--:--'}</div>
              <div class="timeline__node"></div>
              <div class="timeline__card card timeline__card--${badge.cls} ${isDone ? 'is-done' : ''}">
                <button type="button" class="timeline__delete" data-task-id="${e.id}" aria-label="この予定を削除">${Icons.close}</button>
                <div class="timeline__card-main">
                  <button type="button" class="timeline__check ${isDone ? 'is-checked' : ''}" data-task-id="${e.id}" aria-label="${isDone ? '完了を取り消す' : '完了にする'}">${isDone ? Icons.check : ''}</button>
                  <div class="timeline__card-body">
                    <div class="timeline__badge">${badge.label}</div>
                    <div class="timeline__title">${escapeHtml(e.title)}</div>
                    ${e.memo ? `<div class="timeline__meta">${escapeHtml(e.memo)}</div>` : ''}
                    ${
                      e.rescheduleHistory && e.rescheduleHistory.from
                        ? `<div class="timeline__meta">↳ ${escapeHtml(
                            e.rescheduleHistory.from.startTime || '--:--'
                          )}から変更</div>`
                        : ''
                    }
                  </div>
                </div>
              </div>
            </div>
          `;
        })
        .join('')}
    </div>
  `;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function renderScheduleTab(root) {
  const state = { target: 'today' };

  function paint() {
    const dateStr = DateUtils.resolveTarget(state.target);
    const events = getEventsFor(dateStr);

    root.innerHTML = `
      <div class="app-header">
        <h1 class="app-header__title display">予定</h1>
        <p class="app-header__subtitle">${DateUtils.formatDateLabel(dateStr)}</p>
        <div class="segmented u-mt-16">
          <button class="segmented__option ${state.target === 'today' ? 'is-selected' : ''}" data-target="today">今日</button>
          <button class="segmented__option ${state.target === 'tomorrow' ? 'is-selected' : ''}" data-target="tomorrow">明日</button>
        </div>
      </div>
      <div class="screen-body screen-body--fab-spacing">
        ${renderTimeline(events)}
        <button id="consult-schedule" class="btn btn--primary btn--block u-mt-24">
          ${Icons.chat} 予定について相談
        </button>
      </div>
      <button class="fab" id="add-schedule-task" aria-label="予定を追加">${Icons.plus}</button>
    `;

    root.querySelectorAll('.segmented__option').forEach((btn) => {
      btn.addEventListener('click', () => {
        state.target = btn.dataset.target;
        paint();
      });
    });

    root.querySelector('#consult-schedule').addEventListener('click', () => {
      window.App.openChat('schedule', state.target);
    });

    root.querySelector('#add-schedule-task').addEventListener('click', () => {
      window.App.openTaskEditor({ mode: 'schedule', date: DateUtils.resolveTarget(state.target) });
    });

    root.querySelectorAll('.timeline__row').forEach((row) => {
      row.addEventListener('click', (e) => {
        if (e.target.closest('.timeline__delete') || e.target.closest('.timeline__check')) return;
        window.App.openTaskEditor({
          mode: 'schedule',
          date: DateUtils.resolveTarget(state.target),
          taskId: row.dataset.taskId,
        });
      });
    });

    root.querySelectorAll('.timeline__delete').forEach((btn) => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const evt = Storage.Collection.find('events', (ev) => ev.id === btn.dataset.taskId);
        if (!evt) return;
        const ok = window.confirm('この予定を削除します。よろしいですか？');
        if (!ok) return;
        if (evt.sourceType === 'base_schedule') {
          // 基本スケジュールの設定（テンプレート）自体は変更せず、この日のこの予定だけを
          // 非表示にする。他の日・今後の日には引き続き反映される。
          Storage.Collection.update('events', evt.id, {
            status: 'skipped',
            updatedAt: new Date().toISOString(),
          });
        } else {
          Storage.Collection.remove('events', evt.id);
        }
        window.App.toast('削除しました');
        paint();
      });
    });

    root.querySelectorAll('.timeline__check').forEach((btn) => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const evt = Storage.Collection.find('events', (ev) => ev.id === btn.dataset.taskId);
        if (!evt) return;
        Storage.Collection.update('events', evt.id, { status: evt.status === 'done' ? 'planned' : 'done' });
        paint();
      });
    });
  }

  paint();
}

window.Screens = window.Screens || {};
window.Screens.schedule = renderScheduleTab;

})();


/**
 * mealTab.js
 * 「献立タブ」：その日(今日/明日)の献立プラン（MEALPLAN）を表示する。
 * FR-0 / FR-2 / FR-5 / FR-6 に対応（2026-07-12 献立モデル再設計版）。
 *
 * 「1料理＝1カード」ではなく、上部固定のメニュー見出し（dishes）＋
 * 複数料理をまたいだ工程タイムライン（steps）という構成にする。
 * 工程の削除（×ボタン）・並び替え（上へ/下へボタン）はこの画面上で直接行い、
 * メニュー編集・工程の追加/編集は mealPlanEditor.js のシートで行う。
 */

(function () {
  'use strict';

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str == null ? '' : str;
  return div.innerHTML;
}

function getMealPlan(dateStr) {
  return window.MealPlanEditor.getMealPlan(dateStr);
}

function renderStepCard(step, index, total) {
  return `
    <div class="card step-card" data-step-id="${step.id}">
      <button type="button" class="step-card__remove" aria-label="この工程を削除">${Icons.close}</button>
      <div class="step-card__duration">${step.durationMinutes != null && step.durationMinutes !== '' ? step.durationMinutes + '分' : '--分'}</div>
      <div class="step-card__title">${escapeHtml(step.title)}</div>
      ${step.description ? `<div class="step-card__description">${escapeHtml(step.description)}</div>` : ''}
      <div class="step-card__order-controls">
        <button type="button" class="step-card__order-btn" data-direction="up" aria-label="上へ" ${index === 0 ? 'disabled' : ''}>${Icons.arrowUp}</button>
        <button type="button" class="step-card__order-btn" data-direction="down" aria-label="下へ" ${index === total - 1 ? 'disabled' : ''}>${Icons.arrowDown}</button>
      </div>
    </div>
  `;
}

function renderSteps(steps) {
  if (steps.length === 0) {
    return `
      <div class="empty-state empty-state--meal">
        <p class="empty-state__text">工程がまだありません。<br>右下の＋から段取りを組み立てましょう。</p>
      </div>
    `;
  }
  return `
    <div class="step-list">
      ${steps.map((s, i) => renderStepCard(s, i, steps.length)).join('')}
    </div>
  `;
}

function renderMealTab(root) {
  const state = { target: 'today' };

  function paint() {
    const dateStr = DateUtils.resolveTarget(state.target);
    const plan = getMealPlan(dateStr);
    const dishes = plan && plan.menuConfirmed ? plan.dishes : [];
    const steps = plan ? [...plan.steps].sort((a, b) => a.order - b.order) : [];
    const hasMenu = dishes.length > 0;
    const totalMinutes = steps.reduce((sum, s) => sum + (typeof s.durationMinutes === 'number' ? s.durationMinutes : 0), 0);

    root.innerHTML = `
      <div class="app-header app-header--meal">
        <h1 class="app-header__title display">献立</h1>
        <p class="app-header__subtitle">${DateUtils.formatDateLabel(dateStr)}</p>
        <div class="segmented segmented--meal u-mt-16">
          <button class="segmented__option ${state.target === 'today' ? 'is-selected' : ''}" data-target="today">今日</button>
          <button class="segmented__option ${state.target === 'tomorrow' ? 'is-selected' : ''}" data-target="tomorrow">明日</button>
        </div>
      </div>
      <div class="screen-body screen-body--fab-spacing">
        ${
          hasMenu
            ? `
        <div class="meal-plan-header">
          <div class="meal-plan-header__label">今日の献立</div>
          <div class="meal-plan-header__dishes">${escapeHtml(dishes.join('、'))}</div>
          ${totalMinutes > 0 ? `<div class="meal-plan-header__total-time">合計 ${totalMinutes}分</div>` : ''}
          <button type="button" id="edit-menu" class="meal-plan-header__edit">${Icons.pencil} メニューを編集</button>
        </div>
        ${renderSteps(steps)}
        `
            : `
        <div class="empty-state empty-state--meal">
          <div class="empty-state__motif">🍚</div>
          <p class="empty-state__text">
            まだ献立が決まっていません。<br>
            「献立について相談」するか、右下の＋からメニューを決めてみましょう。
          </p>
        </div>
        `
        }
        <button type="button" id="consult-meal" class="btn btn--meal-primary btn--block u-mt-24">
          ${Icons.chat} 献立について相談
        </button>
      </div>
      <button class="fab fab--meal" id="meal-fab" aria-label="${hasMenu ? '工程を追加' : 'メニューを決める'}">${Icons.plus}</button>
    `;

    root.querySelectorAll('.segmented__option').forEach((btn) => {
      btn.addEventListener('click', () => {
        state.target = btn.dataset.target;
        paint();
      });
    });

    root.querySelector('#consult-meal').addEventListener('click', () => {
      window.App.openChat('meal', state.target);
    });

    const editMenuBtn = root.querySelector('#edit-menu');
    if (editMenuBtn) editMenuBtn.addEventListener('click', () => window.MealPlanEditor.openDishesEditor(dateStr, paint));

    root.querySelector('#meal-fab').addEventListener('click', () => {
      if (hasMenu) {
        window.MealPlanEditor.openStepEditor(dateStr, null, paint);
      } else {
        window.MealPlanEditor.openDishesEditor(dateStr, paint);
      }
    });

    root.querySelectorAll('.step-card').forEach((card) => {
      card.addEventListener('click', (e) => {
        if (e.target.closest('.step-card__remove') || e.target.closest('.step-card__order-btn')) return;
        window.MealPlanEditor.openStepEditor(dateStr, card.dataset.stepId, paint);
      });
    });

    root.querySelectorAll('.step-card__remove').forEach((btn) => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const card = e.currentTarget.closest('.step-card');
        const ok = window.confirm('この工程を削除します。よろしいですか？');
        if (!ok) return;
        window.MealPlanEditor.removeStep(dateStr, card.dataset.stepId);

/**
 * ingredients.js
 * 食材メモ画面。FR-3対応。

(function () {

function escapeHtml(str) {

}

/** 食材メモの追加・編集モーダル（画面遷移ではなくモーダルのため、taskEditorとは別に軽量に実装） */
function openIngredientModal(existing, onSaved) {

const PRIORITY_ORDER = { high: 0, normal: 1, low: 2 };
const PRIORITY_LABELS_LIST = { high: '高', normal: '中', low: '低' };
const PRIORITY_CYCLE = { high: 'normal', normal: 'low', low: 'high' };

/**
 * 一覧の並び順キャッシュ。
 * 優先度でソートするタイミングを「タブを開いた瞬間」だけに限定するための仕組み。
 * タブを開いている間に優先度を編集・削除しても、この配列（IDの並び）は更新しない。
 * こうしないと、優先度を切り替えるたびに一覧全体が並び替わり、行の位置が動いて
 * 連続で他の行を操作しづらくなる（旧アプリで指摘済みの不具合）。
 * タブを離れて戻ってきたとき（route再描画時）にのみ null にリセットし、再ソートする。
 */
let ingredientOrderCache = null;

function computeSortedIds(items) {
  return [...items]
    .sort((a, b) => {
      const pa = PRIORITY_ORDER[a.priority] ?? PRIORITY_ORDER.normal;
      const pb = PRIORITY_ORDER[b.priority] ?? PRIORITY_ORDER.normal;
      if (pa !== pb) return pa - pb;
      return (a.createdAt || '').localeCompare(b.createdAt || '');
    })
    .map((i) => i.id);
}

/**
 * @param {boolean} forceResort - true: 優先度順に並び替え直す（タブへの新規遷移時）
 *                                false: 既存の並び順を維持したまま内容だけ更新する（タブ内での編集・削除後）
 */
function renderIngredients(root, forceResort = true) {
  const items = Storage.Collection.all('ingredients');

  if (forceResort || !ingredientOrderCache) {
    ingredientOrderCache = computeSortedIds(items);
  } else {
    // 削除された食材をキャッシュの並びから除外
    const existingIds = new Set(items.map((i) => i.id));
    ingredientOrderCache = ingredientOrderCache.filter((id) => existingIds.has(id));
    // 新規追加された食材は、優先度順で並べた上で末尾に追加する（既存の行の位置は変えない）
    const knownIds = new Set(ingredientOrderCache);
    const newItems = items.filter((i) => !knownIds.has(i.id));
    if (newItems.length > 0) {
      ingredientOrderCache = [...ingredientOrderCache, ...computeSortedIds(newItems)];
    }
  }

  const itemsById = new Map(items.map((i) => [i.id, i]));
  const orderedItems = ingredientOrderCache.map((id) => itemsById.get(id)).filter(Boolean);

  root.innerHTML = `
    <div class="app-header">
      <h1 class="app-header__title display">食材メモ</h1>
      <p class="app-header__subtitle">献立の相談時にAIが参考にします（優先度は丸をタップで切替）</p>
    </div>
    <div class="screen-body screen-body--fab-spacing">
      ${
        orderedItems.length === 0
          ? `<div class="empty-state">
               <div class="empty-state__motif">🥕</div>
               <p class="empty-state__text">使いたい食材をメモしておくと、献立の相談がスムーズになります。</p>
             </div>`
          : `<div class="ingredient-list">${orderedItems
              .map((i) => {
                const priority = i.priority && PRIORITY_LABELS_LIST[i.priority] ? i.priority : 'normal';
                return `
              <div class="ingredient-row" data-ingredient-id="${i.id}">
                <button type="button" class="ingredient-row__priority ingredient-row__priority--${priority}"
                  data-ingredient-id="${i.id}" data-priority="${priority}"
                  aria-label="優先度：${PRIORITY_LABELS_LIST[priority]}（タップで切替）">${PRIORITY_LABELS_LIST[priority]}</button>
                <div class="ingredient-row__body" data-open-ingredient-id="${i.id}">
                  <span class="ingredient-row__name">${escapeHtml(i.name)}</span>
                  ${i.memo ? `<span class="ingredient-row__memo">${escapeHtml(i.memo)}</span>` : ''}
                </div>
                <button class="ingredient-row__delete ingredient-delete" data-ingredient-id="${i.id}" aria-label="削除">${Icons.close}</button>
              </div>`;
              })
              .join('')}</div>`
      }
    </div>
    <button class="fab" id="add-ingredient" aria-label="食材を追加">${Icons.plus}</button>
  `;

  root.querySelector('#add-ingredient').addEventListener('click', () => {
    openIngredientModal(null, () => renderIngredients(root, false));
  });

  root.querySelectorAll('[data-open-ingredient-id]').forEach((el) => {
    el.addEventListener('click', () => {
      const item = Storage.Collection.find('ingredients', (i) => i.id === el.dataset.openIngredientId);
      openIngredientModal(item, () => renderIngredients(root, false));
    });
  });

  root.querySelectorAll('.ingredient-row__priority').forEach((btn) => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const current = btn.dataset.priority;
      const next = PRIORITY_CYCLE[current] || 'normal';
      Storage.Collection.update('ingredients', btn.dataset.ingredientId, {
        priority: next,
        updatedAt: new Date().toISOString(),
      });
      renderIngredients(root, false);
    });
  });

  root.querySelectorAll('.ingredient-delete').forEach((btn) => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const ok = window.confirm('この食材メモを削除します。よろしいですか？');
      if (!ok) return;
      Storage.Collection.remove('ingredients', btn.dataset.ingredientId);
      window.App.toast('削除しました');
      renderIngredients(root, false);
    });
  });
}

window.Screens = window.Screens || {};

/**
 * diary.js
 * 日記画面。FR-8対応（AI不使用・テンプレート自動書き出し＋手動編集）。
 * 直近7日分（今日〜6日前）を「◀ ▶」で行き来できる（それより古いデータは
 * dataRetention.js によりアプリ起動時に自動削除される）。
 * 未作成の日は自動書き出し→ボトムシートで確認・保存。作成済みの日は
 * 「編集」（再書き出しなし）「作り直す」（最新データで再書き出し）「共有」を提供する。
 * 天気（プルダウン、手入力なし）と今日のひと言欄（複数行・任意）はAI/自動書き出しの対象外で、
 * 「作り直す」を実行してもこの2つの値は保持される（予定・献立のみ再書き出しされる）。
 */

(function () {
  'use strict';

const MAX_OFFSET = 6; // 今日から最大6日前まで遡れる

const WEATHER_OPTIONS = [
  { value: '', emoji: '', label: '未設定' },
  { value: 'sunny', emoji: '☀️', label: '晴れ' },
  { value: 'partly_cloudy', emoji: '⛅', label: '晴れ時々くもり' },
  { value: 'cloudy', emoji: '☁️', label: 'くもり' },
  { value: 'rainy', emoji: '🌧️', label: '雨' },
  { value: 'snowy', emoji: '⛄', label: '雪' },
];

function weatherOption(value) {
  return WEATHER_OPTIONS.find((w) => w.value === value) || WEATHER_OPTIONS[0];
}

function weatherSelectHtml(id, selectedValue) {
  return `
    <select id="${id}" class="select" style="width:auto; padding:8px 12px;">
      ${WEATHER_OPTIONS.map(
        (w) =>
          `<option value="${w.value}" ${w.value === (selectedValue || '') ? 'selected' : ''}>${
            w.emoji ? `${w.emoji} ` : ''
          }${w.label}</option>`
      ).join('')}
    </select>
  `;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str == null ? '' : str;
  return div.innerHTML;
}

function getDiary(dateStr) {
  return Storage.Collection.find('diaries', (d) => d.date === dateStr);
}

/** その日のタスク（ルーティン以外）と献立プランのメニューから、日記の初期内容を組み立てる
 *  （天気・今日のひと言は自動書き出しの対象外のため、ここでは扱わない） */
function buildAutoContent(dateStr) {
  const events = Storage.Collection
    .filter(
      'events',
      (e) =>
        e.date === dateStr &&
        // 基本スケジュール由来のタスクは通常は日記に載せないが、
        // リスケ済み（rescheduleHistory.noteがある）場合は「リスケした事実と理由」だけ例外的に載せる
        (e.sourceType !== 'base_schedule' || (e.rescheduleHistory && e.rescheduleHistory.from && e.rescheduleHistory.note))
    )
    .sort((a, b) => (a.startTime || '').localeCompare(b.startTime || ''));
  const plan = window.MealPlanEditor.getMealPlan(dateStr);
  const dishes = plan ? plan.dishes || [] : [];

  return {
    // FR-7：リスケ・中止済みのタスクは、チャット確定時に生成した一言（rescheduleHistory.note）を反映する。
    // - 中止済み（status:'skipped'）は、一言の中にタスク名が含まれているため、タイトルの箇条書きは重複するので出さず一言だけ載せる
    // - 基本スケジュール由来でリスケ済みのものも同様に、タスク名は載せず一言だけを載せる（家事の定型リストを毎日書き出したくないため）
    // - それ以外（postponeで生きている一回限りのタスク）は、タイトル＋一言の両方を載せる
    tasksSection: events
      .map((e) => {
        const hasNote = e.rescheduleHistory && e.rescheduleHistory.from && e.rescheduleHistory.note;
        if (e.status === 'skipped') {
          return hasNote ? `・${e.rescheduleHistory.note}` : null;
        }
        if (e.sourceType === 'base_schedule') {
          return hasNote ? `・${e.rescheduleHistory.note}` : null;
        }
        return hasNote ? `・${e.title}\n　${e.rescheduleHistory.note}` : `・${e.title}`;
      })
      .filter(Boolean)
      .join('\n'),
    mealsSection: dishes.map((d) => `・${d}`).join('\n'),
    generatedFromTaskIds: events.map((e) => e.id),
    generatedFromMealPlanId: plan ? plan.id : null,
  };
}

function saveDiary(dateStr, content) {
  const now = new Date().toISOString();
  const existing = getDiary(dateStr);
  const patch = {
    weather: content.weather || '',
    tasksSection: content.tasksSection,
    mealsSection: content.mealsSection,
    freeSection: content.freeSection || '',
    generatedFromTaskIds: content.generatedFromTaskIds || (existing ? existing.generatedFromTaskIds : []),
    generatedFromMealPlanId:
      content.generatedFromMealPlanId !== undefined
        ? content.generatedFromMealPlanId
        : existing
        ? existing.generatedFromMealPlanId
        : null,
    updatedAt: now,
  };
  if (existing) {
    return Storage.Collection.update('diaries', existing.id, patch);
  }
  return Storage.Collection.insert('diaries', {
    id: IdGenerator.diaryIdForDate(dateStr),
    date: dateStr,
    createdAt: now,
    ...patch,
  });
}

/** 表示画面の天気プルダウンから、日記シートを開かずその場で天気だけを保存する
 *  （食材メモの優先度クイック切替と同じ考え方）。日記が未作成の日は何もしない */
function updateWeatherOnly(dateStr, value) {
  const existing = getDiary(dateStr);
  if (!existing) return;
  Storage.Collection.update('diaries', existing.id, { weather: value, updatedAt: new Date().toISOString() });
}

/** 新規作成・編集・作り直しのいずれもこのボトムシートを共用する */
function openEditSheet(dateStr, initial, onSaved) {
  const modalRoot = document.getElementById('modal-root');
  if (!modalRoot) return;

  const state = {
    weather: initial.weather || '',
    tasksSection: initial.tasksSection || '',
    mealsSection: initial.mealsSection || '',
    freeSection: initial.freeSection || '',
  };

  function paint() {
    modalRoot.innerHTML = `
      <div class="sheet-backdrop" id="diary-edit-backdrop">
        <div class="sheet">
          <div class="sheet__handle"></div>
          <div class="sheet__header">
            <h2 class="display" style="font-size:18px;">日記を編集</h2>
            <button class="sheet__close" id="diary-edit-close" aria-label="閉じる">${Icons.close}</button>
          </div>

          <div class="field">
            <label class="field__label" for="diary-edit-weather">天気</label>
            ${weatherSelectHtml('diary-edit-weather', state.weather)}
          </div>

          <div class="field">
            <label class="field__label" for="diary-edit-tasks">今日の予定</label>
            <textarea id="diary-edit-tasks" class="textarea" rows="5" placeholder="・予定を入力">${escapeHtml(state.tasksSection)}</textarea>
          </div>

          <div class="field">
            <label class="field__label" for="diary-edit-meals">今日の献立</label>
            <textarea id="diary-edit-meals" class="textarea" rows="5" placeholder="・献立を入力">${escapeHtml(state.mealsSection)}</textarea>
          </div>

          <div class="field">
            <label class="field__label" for="diary-edit-free">今日のひと言</label>
            <textarea id="diary-edit-free" class="textarea" rows="5" placeholder="なんでも自由に書けます">${escapeHtml(state.freeSection)}</textarea>
          </div>

          <button id="diary-edit-save" class="btn btn--primary btn--block u-mt-16">保存する</button>
        </div>
      </div>
    `;
    bindEvents();
  }

  function bindEvents() {
    modalRoot.querySelector('#diary-edit-backdrop').addEventListener('click', (e) => {
      if (e.target.id === 'diary-edit-backdrop') close();
    });
    modalRoot.querySelector('#diary-edit-close').addEventListener('click', () => close());
    modalRoot.querySelector('#diary-edit-weather').addEventListener('change', (e) => {
      state.weather = e.target.value;
    });
    modalRoot.querySelector('#diary-edit-tasks').addEventListener('input', (e) => {
      state.tasksSection = e.target.value;
    });
    modalRoot.querySelector('#diary-edit-meals').addEventListener('input', (e) => {
      state.mealsSection = e.target.value;

    modalRoot.querySelector('#diary-edit-free').addEventListener('input', (e) => {

    });
    modalRoot.querySelector('#diary-edit-save').addEventListener('click', () => {
      saveDiary(dateStr, {
        weather: state.weather,
        tasksSection: state.tasksSection,
        mealsSection: state.mealsSection,
        freeSection: state.freeSection,
        generatedFromTaskIds: initial.generatedFromTaskIds,
        generatedFromMealPlanId: initial.generatedFromMealPlanId,
      });
      window.App.toast('保存しました');
      close();
      if (typeof onSaved === 'function') onSaved();
    });
  }

  function close() {
    modalRoot.innerHTML = '';
  }

  paint();
}

/** 共有・エクスポート用のテキストを組み立てる（日付・天気・各セクションに見出しを付ける） */
function buildShareText(diary) {
  const w = weatherOption(diary.weather);
  const weatherLabel = w.value ? `${w.emoji} ${w.label}` : '未設定';
  return [
    `${DateUtils.formatDateLabel(diary.date)}　天気：${weatherLabel}`,
    '',
    '【今日の予定】',
    diary.tasksSection || '',
    '',
    '【今日の献立】',
    diary.mealsSection || '',
    '',
    '【今日のひと言】',
    diary.freeSection || '',
  ].join('\n');
}

async function shareDiary(diary) {
  const text = buildShareText(diary);
  if (navigator.share) {
    try {
      await navigator.share({ title: `日記 ${DateUtils.formatDateLabel(diary.date)}`, text });
    } catch (e) {
      // ユーザーによるキャンセル等はエラー扱いしない
    }
    return;
  }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    try {
      await navigator.clipboard.writeText(text);
      window.App.toast('共有に対応していない環境のため、クリップボードにコピーしました');
    } catch (e) {
      window.App.toast('共有に対応していない環境です');
    }
  } else {
    window.App.toast('共有に対応していない環境です');
  }
}

/**

 * この土台フェーズで先に実装しておく。
 */

(function () {
  'use strict';

function downloadJson(filename, data) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function exportAllData() {
  const keys = Storage.listKeys('');
  const dump = {};
  keys.forEach((k) => {
    dump[k] = Storage.get(k);
  });
  const today = DateUtils.todayStr();
  downloadJson(`dailyplanner-ai_backup_${today}.json`, dump);
}

/**
 * バックアップJSONを読み込み、現在のデータにマージ（upsert）する。
 * - col:xxx（events/baseSchedules/ingredients/messages/suggestions/diaries/mealPlans等の配列）は
 *   idで突き合わせ、同じidがあればバックアップ側の内容で上書き、無ければ追加する（重複させない）
 * - idCounters は現在値とバックアップ値の大きい方を採用する（今後発行するIDが過去のものと衝突しないように）
 * - それ以外（settings等）はバックアップ側の値でそのまま上書きする
 * みほさんとの相談で「完全上書き」ではなく「IDで突き合わせるマージ」方式に決定（2026-07-14）
 */
function importAllData(dump) {
  Object.keys(dump).forEach((k) => {
    const incoming = dump[k];

    if (k === 'idCounters' && incoming && typeof incoming === 'object' && !Array.isArray(incoming)) {
      const current = Storage.get('idCounters', {});
      const merged = { ...current };
      Object.keys(incoming).forEach((counterName) => {
        merged[counterName] = Math.max(current[counterName] || 0, incoming[counterName] || 0);
      });
      Storage.set('idCounters', merged);
      return;
    }

    if (k.startsWith('col:') && Array.isArray(incoming)) {
      const collectionName = k.slice('col:'.length);
      const current = Storage.Collection.all(collectionName);
      const byId = new Map(current.map((item) => [item.id, item]));
      incoming.forEach((item) => {
        if (item && item.id) byId.set(item.id, item);
      });
      Storage.Collection.save(collectionName, Array.from(byId.values()));
      return;
    }

    // settings 等、コレクション形式ではないものはそのまま上書き
    Storage.set(k, incoming);
  });
}

/** バックアップファイル（JSON）を選択させ、読み込んでimportAllDataに渡す */
function handleImportFile(file) {
  const reader = new FileReader();
  reader.onload = () => {
    let dump;
    try {
      dump = JSON.parse(reader.result);
    } catch (e) {
      window.App.toast('ファイルの読み込みに失敗しました。正しいバックアップファイルか確認してください。');
      return;
    }
    if (!dump || typeof dump !== 'object' || Array.isArray(dump)) {
      window.App.toast('バックアップファイルの形式が正しくないようです。');
      return;
    }
    const ok = window.confirm(
      'バックアップの内容を現在のデータに読み込みます（同じ内容のデータはバックアップ側で上書きされ、それ以外は残ります）。よろしいですか？'
    );
    if (!ok) return;
    importAllData(dump);
    window.App.toast('復元しました');
    window.App.start();
  };
  reader.onerror = () => {
    window.App.toast('ファイルの読み込みに失敗しました。');
  };
  reader.readAsText(file);
}

  `;

/**
 * baseSchedule.js
 * 設定タブから遷移する「基本スケジュール設定」画面。BASEエンティティ（毎日決まって発生する
 * ルーティンのテンプレート）のCRUD UI。ここで登録したテンプレートは、予定タブのタイムライン描画時に

(function () {
  'use strict';

const DOW_ORDER = ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'];
const DOW_LABEL = { mon: '月', tue: '火', wed: '水', thu: '木', fri: '金', sat: '土', sun: '日' };

function escapeHtml(str) {
  const div = document.createElement('div');

  return div.innerHTML;
}

function renderBaseSchedule(root) {
  const items = Storage.Collection.all('baseSchedules').sort((a, b) =>

  );

  root.innerHTML = `

      <h1 class="app-header__title display">基本スケジュール設定</h1>

  `;

  root.querySelector('#bs-back').addEventListener('click', () => {
    window.App.navigate('settings');
  });

  root.querySelector('#add-base').addEventListener('click', () => {
    openBaseScheduleModal(null, () => renderBaseSchedule(root));
  });

  root.querySelectorAll('[data-open-base-id]').forEach((el) => {

function openBaseScheduleModal(existing, onSaved) {
  const modalRoot = document.getElementById('modal-root');
  if (!modalRoot) return;

  const state = {
    title: existing ? existing.title || '' : '',
    startTime: existing ? existing.startTime || '' : '',
    memo: existing ? existing.memo || '' : '',
    daysOfWeek: existing ? DOW_ORDER.filter((d) => (existing.daysOfWeek || []).includes(d)) : [...DOW_ORDER],
  };

  function paint() {
    modalRoot.innerHTML = `
      <div class="sheet-backdrop" id="bs-backdrop">
        <div class="sheet">
          <div class="sheet__handle"></div>
          <div class="sheet__header">
            <h2 class="display" style="font-size:18px;">${existing ? 'ルーティンを編集' : 'ルーティンを追加'}</h2>
            <button class="sheet__close" id="bs-close" aria-label="閉じる">${Icons.close}</button>

              `
              ).join('')}
            </div>
          </div>

          <div class="field">
            <label class="field__label" for="bs-memo">メモ（任意）</label>
            <textarea id="bs-memo" class="textarea" placeholder="メモ">${escapeHtml(state.memo)}</textarea>
          </div>

          <div class="u-flex u-gap-8 u-mt-16">
            ${existing ? `<button id="bs-delete" class="btn btn--danger">削除する</button>` : ''}
            <button id="bs-save" class="btn btn--primary btn--block">保存する</button>
          </div>
        </div>
      </div>
    `;
    bindEvents();
  }

  function bindEvents() {
    modalRoot.querySelector('#bs-backdrop').addEventListener('click', (e) => {
      if (e.target.id === 'bs-backdrop') close();
    });
    modalRoot.querySelector('#bs-close').addEventListener('click', () => close());

    modalRoot.querySelector('#bs-title').addEventListener('input', (e) => {
      state.title = e.target.value;
    });
    modalRoot.querySelector('#bs-start').addEventListener('input', (e) => {
      state.startTime = e.target.value;
    });
    modalRoot.querySelector('#bs-memo').addEventListener('input', (e) => {
      state.memo = e.target.value;
    });

    modalRoot.querySelectorAll('.dow-toggle').forEach((btn) => {
      btn.addEventListener('click', () => {
        const d = btn.dataset.dow;
        if (state.daysOfWeek.includes(d)) {
          state.daysOfWeek = state.daysOfWeek.filter((x) => x !== d);
        } else {
          state.daysOfWeek = DOW_ORDER.filter((x) => state.daysOfWeek.includes(x) || x === d);
        }
        paint();
      });
    });

    if (existing) {
      modalRoot.querySelector('#bs-delete').addEventListener('click', () => {
        const ok = window.confirm('この基本スケジュールを削除します。過去に生成済みの予定には影響しません。よろしいですか？');
        if (!ok) return;
        Storage.Collection.remove('baseSchedules', existing.id);
        window.App.toast('削除しました');
        close(true);
      });
    }

    modalRoot.querySelector('#bs-save').addEventListener('click', () => {
      const title = state.title.trim();
      if (!title) {
        window.App.toast('内容を入力してください');
        return;
      }
      if (!state.startTime) {
        window.App.toast('開始時刻を入力してください');
        return;
      }
      if (state.daysOfWeek.length === 0) {
        window.App.toast('曜日を1つ以上選択してください');
        return;
      }
      const now = new Date().toISOString();
      if (existing) {
        Storage.Collection.update('baseSchedules', existing.id, {
          title,
          startTime: state.startTime,
          daysOfWeek: [...state.daysOfWeek],
          memo: state.memo,
        });
        // 生成済みの予定（今日・明日など）にも、タスク名の変更だけは反映する。
        // 開始時刻・メモはその日ごとに個別編集されている可能性があるため上書きしない。
        Storage.Collection
          .filter('events', (e) => e.sourceType === 'base_schedule' && e.sourceTemplateId === existing.id)
          .forEach((e) => {
            Storage.Collection.update('events', e.id, { title, updatedAt: now });
          });
        window.App.toast('更新しました');
      } else {
        Storage.Collection.insert('baseSchedules', {
          id: IdGenerator.generateId('baseSchedule'),
          title,
          startTime: state.startTime,
          daysOfWeek: [...state.daysOfWeek],
          memo: state.memo,
          createdAt: now,
        });
        window.App.toast('追加しました');
      }
      close(true);
    });
  }

  function close(shouldRefresh) {
    modalRoot.innerHTML = '';
    if (shouldRefresh && typeof onSaved === 'function') onSaved();
  }

  paint();
}

window.Screens = window.Screens || {};
window.Screens.baseSchedule = renderBaseSchedule;

})();

/**
 * mealPlanEditor.js
 * 献立プラン（MEALPLAN）の手動編集。FR-6対応（2026-07-12 新規追加）。
 * - メニュー（dishes）の編集シート：料理名の追加・編集・削除、保存で menuConfirmed:true にする
 * - 工程（steps）1件分の追加・編集シート
 * 工程の削除（×ボタン）・並び替え（上へ/下へ）はmealTab.js側のカードから直接行うため、
 * そのためのデータ操作関数（removeStep / moveStep）もここに集約する。
 */

(function () {
  'use strict';

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str == null ? '' : str;
  return div.innerHTML;
}

function getMealPlan(dateStr) {
  return Storage.Collection.find('mealPlans', (p) => p.date === dateStr);
}

/** 対象日の献立プランが未作成であれば、空のドラフトを作成して返す */
function ensureMealPlan(dateStr) {
  let plan = getMealPlan(dateStr);
  if (!plan) {
    const now = new Date().toISOString();
    plan = {
      id: IdGenerator.mealPlanIdForDate(dateStr),
      date: dateStr,
      dishes: [],
      menuConfirmed: false,
      steps: [],
      createdAt: now,
      updatedAt: now,
    };
    Storage.Collection.insert('mealPlans', plan);
  }
  return plan;
}

function saveMealPlan(dateStr, patch) {
  const plan = ensureMealPlan(dateStr);
  const now = new Date().toISOString();
  Storage.Collection.update('mealPlans', plan.id, { ...patch, updatedAt: now });
  return getMealPlan(dateStr);
}

/** 対象日の献立プラン（メニュー・工程とも）を丸ごと削除し、未着手の状態に戻す */
function clearMealPlan(dateStr) {
  const plan = getMealPlan(dateStr);
  if (plan) Storage.Collection.remove('mealPlans', plan.id);
}

function removeStep(dateStr, stepId) {
  const plan = ensureMealPlan(dateStr);
  const steps = plan.steps
    .filter((s) => s.id !== stepId)
    .sort((a, b) => a.order - b.order)
    .map((s, i) => ({ ...s, order: i + 1 }));
  saveMealPlan(dateStr, { steps });
}

function moveStep(dateStr, stepId, direction) {
  const plan = ensureMealPlan(dateStr);
  const steps = [...plan.steps].sort((a, b) => a.order - b.order);
  const idx = steps.findIndex((s) => s.id === stepId);
  if (idx === -1) return;
  const swapIdx = direction === 'up' ? idx - 1 : idx + 1;
  if (swapIdx < 0 || swapIdx >= steps.length) return;
  const tmp = steps[idx];
  steps[idx] = steps[swapIdx];
  steps[swapIdx] = tmp;
  steps.forEach((s, i) => {
    s.order = i + 1;
  });
  saveMealPlan(dateStr, { steps });
}

/**
 * chatPanel.js
 * 相談チャットの共通UI（予定/献立どちらのモードでも使う）。FR-1・FR-2対応。
 * - 会話履歴（MSG）・AI提案（SUGGEST）は chatMode（schedule/meal）× date（対象日）で完全分離
 * - 予定チャット：構造化提案 → ユーザーが「反映する」を選択 → EVT生成
 * - 予定チャット：リスケ（FR-7・時刻変更のみ、第一弾）にも対応。「寝坊した」等の自然文からrescheduleSuggestionsを
 *   構造化出力させ、対象EVTのstartTimeのみ変更する（BASEテンプレートは不変）。中止（スキップ）は次フェーズで対応
 * - 献立チャット：フェーズ1（メニュー相談→「これで決定」）→フェーズ2（「段取りを作って」→自動反映）
 * - Gemini APIへは responseMimeType:"application/json" + responseSchema で構造化出力を要求する
 *   （設計書8.3のマーカー方式は今回は不採用。JSON Schema指定の方が解析が確実なため）
 */

(function () {
  'use strict';

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str == null ? '' : str;
  return div.innerHTML;
}

/* ------------------------------------------------------------------ */
/* データアクセス（MSG / SUGGEST）                                     */
/* ------------------------------------------------------------------ */

function getMessages(mode, date) {
  return Storage.Collection.filter('messages', (m) => m.chatMode === mode && m.date === date).sort((a, b) =>
    a.createdAt.localeCompare(b.createdAt)
  );
}

function addMessage(mode, date, role, text, extra) {
  const msg = {
    id: IdGenerator.generateId('message'),
    chatMode: mode,
    date,
    role,
    text,
    createdAt: new Date().toISOString(),
    ...(extra || {}),
  };
  Storage.Collection.insert('messages', msg);
  return msg;
}

function getSuggestions(date) {
  return Storage.Collection.filter('suggestions', (s) => s.chatMode === 'schedule' && s.date === date).sort((a, b) =>
    a.createdAt.localeCompare(b.createdAt)
  );
}

function addSuggestion(date, sourceMessageId, data) {
  const sug = {
    id: IdGenerator.generateId('suggestion'),
    chatMode: 'schedule',
    date,
    sourceMessageId,
    type: 'create', // FR-7：新規作成の提案。リスケ提案は type:'reschedule'（下記addRescheduleSuggestion参照）
    title: data.title,
    startTime: data.startTime || null,
    endTime: data.endTime || null,
    category: data.category || 'other',
    memo: data.memo || '',
    status: 'pending',
    appliedEventId: null,
    createdAt: new Date().toISOString(),
  };
  Storage.Collection.insert('suggestions', sug);
  return sug;
}

function applySuggestion(sug) {
  const now = new Date().toISOString();
  const evt = {
    id: IdGenerator.generateId('event'),
    date: sug.date,
    startTime: sug.startTime || null,
    endTime: sug.endTime || null,
    title: sug.title,
    sourceType: 'ai_chat',
    sourceTemplateId: null,
    sourceSuggestId: sug.id,
    category: sug.category || 'other',
    memo: sug.memo || '',
    rescheduleHistory: null, // FR-7：リスケすると{from,changedAt,note}が入る（直近1件のみ保持）
    status: 'planned',
    createdAt: now,
    updatedAt: now,
  };
  Storage.Collection.insert('events', evt);
  Storage.Collection.update('suggestions', sug.id, { status: 'applied', appliedEventId: evt.id });
  return evt;
}

function dismissSuggestion(sug) {
  Storage.Collection.update('suggestions', sug.id, { status: 'dismissed' });
}

/* ------------------------------------------------------------------ */
/* FR-7：タスクのリスケジュール（時刻変更）                                */
/* ------------------------------------------------------------------ */

/**
 * 日記に載せる一言を、状況パターン（enum）ごとの固定テンプレートに、
 * チャットから抽出した理由フレーズを差し込んで組み立てる。
 * AIには文面そのものを自由生成させず、situationType（分類）とreasonPhrase（抽出）だけを返させることで、
 * 不自然な言い回しや誤情報のリスクを抑える（みほさんとの相談で確定した方針）。
 * situationTypeは今回のフェーズでは 'postpone'（後ろ倒し）のみ有効。'cancel'（中止）は次フェーズで対応。
 */
function buildRescheduleNote(situationType, reasonPhrase, title, newStartTime) {
  const reason = (reasonPhrase || '').trim();
  const suffix = reason ? `（${reason}）` : '';
  if (situationType === 'cancel') {
    return `${title}を中止しました${suffix}`;
  }
  return `${title}を${newStartTime}に変更しました${suffix}`;
}

/** リスケ提案（SUGGEST, type:'reschedule'）を追加する。targetEventは提案時点の元タスク（表示用に情報を控えておく） */
function addRescheduleSuggestion(date, sourceMessageId, data, targetEvent) {
  const situationType = data.situationType === 'cancel' ? 'cancel' : 'postpone';
  const newStartTime = situationType === 'cancel' ? null : data.newStartTime;
  const sug = {
    id: IdGenerator.generateId('suggestion'),
    chatMode: 'schedule',
    date,
    sourceMessageId,
    type: 'reschedule',
    targetEventId: targetEvent.id,
    targetEventTitle: targetEvent.title,
    previousStartTime: targetEvent.startTime,
    newStartTime,
    situationType,
    note: buildRescheduleNote(situationType, data.reasonPhrase, targetEvent.title, newStartTime),
    status: 'pending',
    createdAt: new Date().toISOString(),
  };
  Storage.Collection.insert('suggestions', sug);
  return sug;
}

/**
 * リスケ提案を反映する。
 * - postpone：対象EVTのstartTimeを変更
 * - cancel：対象EVTのstatusを'skipped'にする（タイムラインからは既存の✕削除と同様に非表示になる）
 * どちらもrescheduleHistoryに変更前の値・一言コメントを記録する（直近1件のみ保持。配列にはしない＝みほさんとの相談で確定）。
 * 基本スケジュール由来のタスクでも、この日のEVTインスタンスだけを変更し、BASEテンプレートには触れない。
 */
function applyRescheduleSuggestion(sug) {
  const evt = Storage.Collection.find('events', (e) => e.id === sug.targetEventId);
  if (!evt) {
    // 対象タスクが既に削除済み等の場合は反映できない
    Storage.Collection.update('suggestions', sug.id, { status: 'dismissed' });
    return null;
  }
  const now = new Date().toISOString();
  const patch = {
    rescheduleHistory: {
      from: { date: evt.date, startTime: evt.startTime },
      changedAt: now,
      note: sug.note,
    },
    updatedAt: now,
  };
  if (sug.situationType === 'cancel') {
    patch.status = 'skipped';
  } else {
    patch.startTime = sug.newStartTime;
  }
  Storage.Collection.update('events', evt.id, patch);
  Storage.Collection.update('suggestions', sug.id, { status: 'applied' });
  return evt;
}

/** 献立チャットの「やり直す」：対象日のMEALPLANと、対象日・献立モードの会話履歴を削除する */
function resetMealChat(date) {
  window.MealPlanEditor.clearMealPlan(date);
  Storage.Collection.filter('messages', (m) => m.chatMode === 'meal' && m.date === date).forEach((m) =>
    Storage.Collection.remove('messages', m.id)
  );
  Storage.Collection.filter('suggestions', (s) => s.chatMode === 'meal' && s.date === date).forEach((s) =>
    Storage.Collection.remove('suggestions', s.id)
  );
}

/* ------------------------------------------------------------------ */
/* 送信回数の自主制限（設計書8.3：直近60秒の送信回数を記録し、上限で送信を控える）       */
/* ------------------------------------------------------------------ */

const RATE_LIMIT_WINDOW_MS = 60 * 1000;
const RATE_LIMIT_MAX = 8;

function checkAndRecordRateLimit() {
  const now = Date.now();
  let stamps = Storage.get('apiCallTimestamps', []).filter((t) => now - t < RATE_LIMIT_WINDOW_MS);
  if (stamps.length >= RATE_LIMIT_MAX) {
    Storage.set('apiCallTimestamps', stamps);
    return false;
  }
  stamps.push(now);
  Storage.set('apiCallTimestamps', stamps);
  return true;
}

/* ------------------------------------------------------------------ */
/* Gemini API呼び出し                                                  */
/* ------------------------------------------------------------------ */

const GEMINI_MODEL = 'gemini-2.5-flash';

function geminiEndpoint(apiKey) {
  return `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${encodeURIComponent(apiKey)}`;
}

const SCHEDULE_SCHEMA = {
  type: 'OBJECT',
  properties: {
    reply: { type: 'STRING' },
    suggestions: {
      type: 'ARRAY',
      items: {
        type: 'OBJECT',
        properties: {
          title: { type: 'STRING' },
          startTime: { type: 'STRING' },
          endTime: { type: 'STRING' },
          category: { type: 'STRING', enum: ['work', 'life', 'other'] },
          memo: { type: 'STRING' },
        },
        required: ['title', 'startTime'],
      },
    },
    // FR-7：既存タスクの時刻変更（postpone）・中止（cancel）の提案。新規作成のsuggestionsとは別枠で返させる
    rescheduleSuggestions: {
      type: 'ARRAY',
      items: {
        type: 'OBJECT',
        properties: {
          targetEventId: { type: 'STRING' }, // 下記プロンプトで渡す「この日の既存の予定」の [EVT-xxxxxx] をそのまま使う
          situationType: { type: 'STRING', enum: ['postpone', 'cancel'] },
          newStartTime: { type: 'STRING' }, // "HH:MM"。situationTypeが"postpone"のときのみ必須。"cancel"のときは空文字でよい
          reasonPhrase: { type: 'STRING' }, // ユーザーの発言から抽出した理由の短いフレーズ。無ければ空文字
        },
        required: ['targetEventId', 'situationType'],
      },
    },
  },
  required: ['reply'],
};

const MEAL_MENU_SCHEMA = {
  type: 'OBJECT',
  properties: {
    reply: { type: 'STRING' },
    dishCandidates: { type: 'ARRAY', items: { type: 'STRING' } },
  },
  required: ['reply'],
};

const MEAL_STEPS_SCHEMA = {
  type: 'OBJECT',
  properties: {
    reply: { type: 'STRING' },
    steps: {
      type: 'ARRAY',
      items: {
        type: 'OBJECT',
        properties: {
          title: { type: 'STRING' },
          description: { type: 'STRING' },
          durationMinutes: { type: 'INTEGER' },
        },
        required: ['title'],
      },
    },
  },
  required: ['reply'],
};

/** 429エラーの種別を判定し、案内メッセージを返す（設計書8.3） */
function describeGeminiError(err) {
  if (err && err.status === 429) {
    const body = (err.body || '').toLowerCase();
    if (body.includes('perday') || body.includes('daily') || body.includes('per_day') || body.includes('quota')) {
      return '1日あたりの利用上限に達したようです。しばらく時間をおくか、明日また試してみてください。';
    }
    return '1分あたりの利用回数が多くなっています。少し時間をおいてから、もう一度送信してください。';
  }
  if (err && err.status === 400) {
    return 'APIキーが正しく認識されませんでした。設定画面でGemini APIキーを確認してください。';
  }
  if (err && err.status === 403) {
    return 'このAPIキーではリクエストが許可されませんでした。設定画面でAPIキーを確認してください。';
  }
  return '通信中にエラーが発生しました。電波状況を確認して、もう一度お試しください。';
}

/**
 * Gemini APIを呼び出す。応答が MAX_TOKENS で打ち切られた場合は、
 * 出力上限を増やして1回だけ自動的に再試行する（設計書8.3）。
 */
async function callGemini({ apiKey, systemInstruction, history, responseSchema }) {
  const contents = history.map((h) => ({
    role: h.role === 'assistant' ? 'model' : 'user',
    parts: [{ text: h.text }],
  }));

  let maxOutputTokens = 1024;
  let lastText = '';

  for (let attempt = 0; attempt < 2; attempt++) {
    const res = await fetch(geminiEndpoint(apiKey), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        systemInstruction: { parts: [{ text: systemInstruction }] },
        contents,
        generationConfig: {
          maxOutputTokens,
          responseMimeType: 'application/json',
          responseSchema,
        },
      }),
    });

    if (!res.ok) {
      const errBody = await res.text().catch(() => '');
      const err = new Error(`gemini_error_${res.status}`);
      err.status = res.status;
      err.body = errBody;
      throw err;
    }

    const data = await res.json();
    const candidate = data.candidates && data.candidates[0];
    const finishReason = candidate && candidate.finishReason;
    const text =
      (candidate && candidate.content && candidate.content.parts && candidate.content.parts.map((p) => p.text || '').join('')) ||
      '';
    lastText = text;

    if (finishReason === 'MAX_TOKENS' && attempt === 0) {
      maxOutputTokens = Math.min(maxOutputTokens * 3, 4096);
      continue;
    }

    try {
      return JSON.parse(text);
    } catch (e) {
      return { reply: text || '（応答をうまく読み取れませんでした。もう一度お試しください）' };
    }
  }

  try {
    return JSON.parse(lastText);
  } catch (e) {
    return { reply: '応答が長くなりすぎたため、途中で打ち切られました。もう少し短く相談してみてください。' };
  }
}

    'suggestions・rescheduleSuggestionsは必ず空配列のままにしてください。それまでは相槌や聞き返しなど、会話の返信(reply)だけを行ってください。',
    '確定の合図がまだ無いのに気を利かせて先回りしてsuggestions・rescheduleSuggestionsを作ってはいけません。',

    'その用件はsuggestionsに入れず、reply内で「◯◯は何時からですか？」のように具体的に聞き返してください。',
    '時刻を聞き取れている用件だけをsuggestionsに含めてください（一部だけ確定・一部だけ聞き返す、という混在も可）。',
    '',
    'startTime/endTimeは "HH:MM" の24時間表記。endTimeが不明な場合のみ空文字で構いません（startTimeは上記の通り必須）。',
    'categoryは "work"（仕事）"life"（生活）"other"（その他）のいずれかにしてください。',

    '「寝坊した」「◯時からリスケして」「後ろ倒しにして」のように、既に登録されている予定の時刻を変えてほしい相談を受けたら、',

    '「◯◯を取りやめて」「◯◯は抜く／やめる／スキップして」のように、予定そのものを中止してほしい相談を受けたら、situationTypeを"cancel"にし、newStartTimeは空文字にしてください。',
    '「今日のタスクを全部後ろ倒しして」のように対象が曖昧な場合は、いきなり全部を対象にせず、',
    '下記の「この日の既存の予定」の中からずらす／中止すべきと考えられるものを判断し、reply内で「〇〇と△△を□時からに変更しますが、よろしいですか？」のように',

    'reasonPhraseには、ユーザーが話した理由を短いフレーズで抜き出してください（例：「寝坊した」「体調不良」）。理由が話されていなければ空文字にしてください。',

/** 手動フォールバック用：APIが使えない時に、Gemini公式アプリへコピペで頼むためのプロンプト文を作る */
function buildManualPromptText(mode, date, historyWithLatestUser) {
  const header =
    mode === 'meal'
      ? `${date}の献立について、次の会話の続きとして自然に返信してください。`
      : `${date}の予定について、次の会話の続きとして自然に返信してください。`;
  const convo = historyWithLatestUser.map((h) => `${h.role === 'user' ? 'わたし' : 'AI'}: ${h.text}`).join('\n');
  return `${header}\n\n${convo}`;
}

/* UI本体                                                              */
